<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:#F5F0E4; }
.stage {
  position:relative; width:1200px; height:675px; overflow:hidden; padding:36px 48px 42px;
  background:
    radial-gradient(ellipse 800px 420px at 50% -12%, rgba(201,162,39,0.14), rgba(201,162,39,0) 65%),
    linear-gradient(165deg,#F7F2E7 0%,#F1EBDB 100%);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic",Roboto,Helvetica,Arial,sans-serif;
  display:flex; flex-direction:column;
}
h1 { color:#26311f; font-size:40px; font-weight:800; text-align:center; }
h1 .gold { color:#A8861B; }
.rule { width:520px; height:3px; margin:12px auto 0; border-radius:2px;
  background:linear-gradient(90deg,rgba(201,162,39,0) 0%,#C9A227 50%,rgba(201,162,39,0) 100%); }
.sect { color:#2E7D46; font-size:18px; font-weight:800; letter-spacing:.12em; margin:16px 0 10px; }
.boards { display:flex; gap:22px; }
.board { flex:1; background:#FBF8EF; border:2px solid rgba(201,162,39,.5); border-radius:16px;
  padding:16px 14px 14px; display:flex; flex-direction:column; align-items:center; gap:11px;
  box-shadow:0 6px 16px rgba(60,50,20,.10); }
.bcards { display:flex; gap:7px; }
.card { position:relative; width:56px; height:80px; background:linear-gradient(175deg,#FDFBF4 0%,#F2EEE3 100%);
  border:1px solid #d9d0b8; border-radius:7px; box-shadow:0 4px 9px rgba(60,50,20,.20); }
.card .corner { position:absolute; top:5px; left:6px; font-size:15px; font-weight:800; line-height:1; text-align:center; }
.card .corner .csuit { display:block; font-size:11px; line-height:1; margin-top:1px; }
.card .big { position:absolute; top:50%; left:50%; transform:translate(-42%,-44%); font-size:33px; line-height:1; }
.black { color:#1a1a1a; } .red { color:#c0392b; }
.btype { color:#54604a; font-size:16px; font-weight:700; }
.badvice { background:#2E7D46; color:#F5F0E4; border-radius:999px; padding:9px 18px; font-size:18px; font-weight:800; text-align:center; }
.board.warn .badvice { background:#A8861B; }
.board.mid .badvice { background:#26311f; }
/* miss row */
.miss { margin-top:18px; display:flex; gap:22px; }
.missbox { flex:1; display:flex; align-items:center; gap:14px; background:#FBF8EF;
  border:2px solid rgba(201,162,39,.5); border-radius:14px; padding:16px 20px;
  box-shadow:0 6px 16px rgba(60,50,20,.10); }
.misscond { background:#26311f; color:#F5F0E4; border-radius:10px; padding:11px 16px; font-size:18px; font-weight:800; white-space:nowrap; }
.arrow { color:#A8861B; font-size:26px; font-weight:900; }
.missact { color:#26311f; font-size:21px; font-weight:800; }
.missact .gold { color:#A8861B; }
.wordmark { position:absolute; right:44px; bottom:18px; color:#A8861B; font-size:15px; font-weight:800; letter-spacing:.04em; }
</style>
</head>
<body>
<div class="stage">
  <h1>AK 포스트플랍 <span class="gold">— 히트·미스 대응</span></h1>
  <div class="rule"></div>
  <div class="sect">히트 — 보드 예시별 대응</div>
  <div class="boards">
    <div class="board">
      <div class="bcards">
        <div class="card"><div class="corner red">A<span class="csuit">&#9830;</span></div><div class="big red">&#9830;</div></div>
        <div class="card"><div class="corner black">7<span class="csuit">&#9827;</span></div><div class="big black">&#9827;</div></div>
        <div class="card"><div class="corner black">2<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
      </div>
      <div class="btype">드라이 보드</div>
      <div class="badvice">강하게 밸류</div>
    </div>
    <div class="board warn">
      <div class="bcards">
        <div class="card"><div class="corner black">A<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
        <div class="card"><div class="corner red">J<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
        <div class="card"><div class="corner red">10<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
      </div>
      <div class="btype">웻 보드</div>
      <div class="badvice">빠른 베팅 · 드로 주의</div>
    </div>
    <div class="board mid">
      <div class="bcards">
        <div class="card"><div class="corner black">A<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
        <div class="card"><div class="corner red">A<span class="csuit">&#9830;</span></div><div class="big red">&#9830;</div></div>
        <div class="card"><div class="corner black">7<span class="csuit">&#9827;</span></div><div class="big black">&#9827;</div></div>
      </div>
      <div class="btype">페어 보드</div>
      <div class="badvice">중간 사이즈</div>
    </div>
  </div>
  <div class="sect">미스 — 플랍을 놓쳤다면</div>
  <div class="miss">
    <div class="missbox">
      <div class="misscond">드라이 보드</div>
      <div class="arrow">&#8594;</div>
      <div class="missact">C벳 <span class="gold">1회만</span></div>
    </div>
    <div class="missbox">
      <div class="misscond">멀티웨이</div>
      <div class="arrow">&#8594;</div>
      <div class="missact">미련 없이 <span class="gold">포기</span></div>
    </div>
  </div>
  <div class="wordmark">&#9824;HoldemMaster</div>
</div>
</body>
</html>
