<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #0B1F17; }
  #frame {
    position: relative;
    width: 1200px;
    height: 675px;
    overflow: hidden;
    background: linear-gradient(160deg, #0B1F17 0%, #13291D 55%, #0B1F17 100%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 44px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
  }
  .glow {
    position: absolute;
    left: 50%; top: 44%;
    width: 900px; height: 520px;
    transform: translate(-50%, -50%);
    background: radial-gradient(ellipse at center, rgba(46,125,70,0.26) 0%, rgba(46,125,70,0.0) 65%);
    pointer-events: none;
  }
  .title {
    position: relative;
    color: #F2EEE3;
    font-size: 40px;
    font-weight: 800;
    letter-spacing: 0.02em;
    text-align: center;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  .title .gold { color: #C9A227; }
  .label {
    color: #C9A227;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.28em;
    text-align: center;
    margin-bottom: 8px;
  }
  .board-row {
    position: relative;
    display: flex;
    gap: 14px;
    justify-content: center;
  }
  .card {
    position: relative;
    width: 92px;
    height: 132px;
    background: linear-gradient(175deg, #FDFBF4 0%, #F2EEE3 100%);
    border-radius: 9px;
    box-shadow: 0 6px 14px rgba(0,0,0,0.45), 0 1px 3px rgba(0,0,0,0.3);
  }
  .card .corner {
    position: absolute;
    top: 7px;
    left: 8px;
    font-size: 23px;
    font-weight: 800;
    line-height: 1.0;
    text-align: center;
  }
  .card .corner .csuit {
    display: block;
    font-size: 16px;
    line-height: 1.0;
    margin-top: 1px;
  }
  .card .big {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-42%, -44%);
    font-size: 55px;
    line-height: 1;
  }
  .card.sm { width: 72px; height: 102px; border-radius: 8px; }
  .card.sm .corner { top: 5px; left: 6px; font-size: 19px; }
  .card.sm .corner .csuit { font-size: 13px; }
  .card.sm .big { font-size: 42px; }
  .black { color: #1a1a1a; }
  .red { color: #c0392b; }
  .players {
    position: relative;
    display: flex;
    gap: 90px;
    justify-content: center;
  }
  .player { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .player-label {
    color: #F2EEE3;
    font-size: 19px;
    font-weight: 700;
    letter-spacing: 0.05em;
    opacity: 0.95;
  }
  .hand-cards { display: flex; gap: 10px; }
  .vs {
    color: #C9A227;
    font-size: 24px;
    font-weight: 900;
    letter-spacing: 0.08em;
    align-self: center;
  }
  .badge {
    position: relative;
    display: inline-block;
    background: linear-gradient(175deg, #D9B33A 0%, #C9A227 100%);
    color: #0B1F17;
    font-size: 24px;
    font-weight: 900;
    letter-spacing: 0.06em;
    padding: 13px 40px;
    border-radius: 999px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.4);
    white-space: nowrap;
  }
  .wordmark {
    position: absolute;
    right: 44px;
    bottom: 44px;
    color: #C9A227;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.04em;
    opacity: 0.9;
  }
</style>
</head>
<body>
<div id="frame">
  <div class="glow"></div>

  <div class="title"><span class="gold">Showdown</span></div>

  <div style="position: relative;">
    <div class="label">THE BOARD</div>
    <div class="board-row">
      <div class="card"><div class="corner black">10<span class="csuit">&#9827;</span></div><div class="big black">&#9827;</div></div>
      <div class="card"><div class="corner red">7<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
      <div class="card"><div class="corner red">J<span class="csuit">&#9830;</span></div><div class="big red">&#9830;</div></div>
      <div class="card"><div class="corner black">4<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
      <div class="card"><div class="corner black">9<span class="csuit">&#9827;</span></div><div class="big black">&#9827;</div></div>
    </div>
  </div>

  <div class="players">
    <div class="player">
      <div class="player-label">Player 1</div>
      <div class="hand-cards">
        <div class="card sm"><div class="corner red">K<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
        <div class="card sm"><div class="corner black">K<span class="csuit">&#9827;</span></div><div class="big black">&#9827;</div></div>
      </div>
    </div>
    <div class="vs">VS</div>
    <div class="player">
      <div class="player-label">Player 2</div>
      <div class="hand-cards">
        <div class="card sm"><div class="corner red">A<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
        <div class="card sm"><div class="corner red">A<span class="csuit">&#9830;</span></div><div class="big red">&#9830;</div></div>
      </div>
    </div>
  </div>

  <div class="badge">BEST 5 CARDS WIN</div>

  <div class="wordmark">&#9824;HoldemMaster</div>
</div>
</body>
</html>
