<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:#0B1F17; }
.stage {
  position:relative; width:1200px; height:675px; overflow:hidden; padding:44px;
  background:
    radial-gradient(ellipse 900px 500px at 50% -10%, rgba(46,125,70,0.26), rgba(46,125,70,0) 65%),
    linear-gradient(160deg,#0B1F17 0%,#13291D 100%);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  display:flex; flex-direction:column; align-items:center;
}
.kicker { color:#C9A227; font-size:15px; font-weight:700; letter-spacing:.28em; text-align:center; margin-bottom:8px; }
h1 { color:#F2EEE3; font-size:44px; font-weight:800; text-align:center; text-shadow:0 2px 12px rgba(0,0,0,.45); margin-bottom:44px; }
h1 .gold { color:#C9A227; }
.wordmark { position:absolute; right:44px; bottom:28px; color:#C9A227; font-size:15px; font-weight:800; letter-spacing:.04em; opacity:.9; }

.fans { display:flex; gap:52px; align-items:flex-end; justify-content:center; }
.group { display:flex; flex-direction:column; align-items:center; }
.fan { display:flex; align-items:flex-end; padding:0 6px 10px; }
.fan .card { margin-left:-34px; transform-origin:50% 118%; }
.fan .card:nth-child(1) { margin-left:0; transform:rotate(-14deg); }
.fan .card:nth-child(2) { transform:rotate(-7deg); }
.fan .card:nth-child(3) { transform:rotate(0deg); }
.fan .card:nth-child(4) { transform:rotate(7deg); }
.fan .card:nth-child(5) { transform:rotate(14deg); }
.glabel { margin-top:22px; background:rgba(0,0,0,.28); border:2px solid rgba(201,162,39,.55); border-radius:999px; padding:9px 24px; color:#C9A227; font-size:21px; font-weight:800; letter-spacing:.02em; }

/* 카드 (§13 안전: 코너 랭크 + 단일 수트 글리프) */
.card { position:relative; width:88px; height:126px; background:linear-gradient(175deg,#FDFBF4 0%,#F2EEE3 100%); border-radius:10px; box-shadow:0 6px 14px rgba(0,0,0,.45),0 1px 3px rgba(0,0,0,.3); }
.card .corner { position:absolute; top:7px; left:9px; font-size:22px; font-weight:800; line-height:1; text-align:center; }
.card .corner .csuit { display:block; font-size:15px; line-height:1; margin-top:1px; }
.card .big { position:absolute; top:50%; left:50%; transform:translate(-42%,-44%); font-size:52px; line-height:1; }
.black { color:#1a1a1a; } .red { color:#c0392b; }
</style>
</head>
<body>
<div class="stage">
  <div class="kicker">타이브레이크</div>
  <h1>승리 핸드 <span class="gold">3가지</span></h1>

  <div class="fans">
    <div class="group">
      <div class="fan">
        <div class="card"><div class="corner black">5<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
        <div class="card"><div class="corner black">6<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
        <div class="card"><div class="corner black">7<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
        <div class="card"><div class="corner black">8<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
        <div class="card"><div class="corner black">9<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
      </div>
      <div class="glabel">스트레이트 플러시</div>
    </div>

    <div class="group">
      <div class="fan">
        <div class="card"><div class="corner black">A<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
        <div class="card"><div class="corner black">A<span class="csuit">&#9827;</span></div><div class="big black">&#9827;</div></div>
        <div class="card"><div class="corner red">8<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
        <div class="card"><div class="corner black">8<span class="csuit">&#9827;</span></div><div class="big black">&#9827;</div></div>
        <div class="card"><div class="corner red">J<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
      </div>
      <div class="glabel">투 페어</div>
    </div>

    <div class="group">
      <div class="fan">
        <div class="card"><div class="corner red">Q<span class="csuit">&#9830;</span></div><div class="big red">&#9830;</div></div>
        <div class="card"><div class="corner red">Q<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
        <div class="card"><div class="corner black">Q<span class="csuit">&#9827;</span></div><div class="big black">&#9827;</div></div>
        <div class="card"><div class="corner black">2<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
        <div class="card"><div class="corner black">2<span class="csuit">&#9827;</span></div><div class="big black">&#9827;</div></div>
      </div>
      <div class="glabel">풀하우스</div>
    </div>
  </div>

  <div class="wordmark">&#9824;HoldemMaster</div>
</div>
</body>
</html>
