<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:#F5F0E4; }
.stage {
  position:relative; width:1200px; height:675px; overflow:hidden; padding:44px 60px;
  background:
    radial-gradient(ellipse 800px 420px at 50% -10%, rgba(201,162,39,0.16), rgba(201,162,39,0) 65%),
    linear-gradient(160deg,#F8F4E8 0%,#F1EBDA 100%);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
  color:#26311f;
}
.frame-line { position:absolute; inset:22px; border:2px solid rgba(201,162,39,.55); border-radius:18px; pointer-events:none; }
.kicker { color:#C9A227; font-size:15px; font-weight:800; letter-spacing:.30em; text-transform:uppercase; text-align:center; margin-top:8px; }
h1 { color:#1d4030; font-size:44px; font-weight:800; text-align:center; margin-top:8px; }
.sub { color:#8a6d1a; font-size:28px; font-weight:800; text-align:center; margin-top:8px; }
.wordmark { position:absolute; right:44px; bottom:40px; color:#C9A227; font-size:15px; font-weight:800; letter-spacing:.04em; opacity:.95; }

.grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; width:100%; margin-top:34px; }
.item {
  height:130px; border-radius:16px; padding:0 26px;
  background:#FDFBF2; border:2px solid rgba(46,125,70,.45);
  box-shadow:0 4px 12px rgba(38,49,31,.10);
  display:flex; align-items:center; gap:22px;
}
.item-text { font-size:26px; font-weight:800; color:#26311f; line-height:1.3; }
.item-text .em { color:#c0392b; }

.ic { width:72px; height:72px; border-radius:50%; flex:none; display:flex; align-items:center; justify-content:center; }
.ic-badge { background:#C9A227; color:#1d4030; font-size:30px; font-weight:900; box-shadow:0 3px 8px rgba(38,49,31,.2); }
.ic-loop { background:#1d4030; color:#F2EEE3; font-size:38px; font-weight:900; }
.ic-check { background:#2E7D46; color:#F2EEE3; font-size:38px; font-weight:900; }
.ic-podium { background:#1d4030; display:flex; align-items:flex-end; justify-content:center; gap:5px; padding-bottom:16px; }
.ic-podium span { display:block; width:11px; border-radius:3px 3px 0 0; background:#C9A227; }
.ic-podium .p1 { height:22px; } .ic-podium .p2 { height:34px; } .ic-podium .p3 { height:14px; }

.site { margin-top:32px; color:#1d4030; font-size:22px; font-weight:800; letter-spacing:.05em; }
</style>
</head>
<body>
<div class="stage">
  <div class="frame-line"></div>
  <div class="kicker">&#9824; &#9829; &#9830; &#9827;</div>
  <h1>홀덤 초보 탈출 Q&amp;A</h1>
  <div class="sub">왜 맨날 돈 잃을까?</div>

  <div class="grid">
    <div class="item">
      <div class="ic ic-badge">10</div>
      <div class="item-text">초보 실수 10가지</div>
    </div>
    <div class="item">
      <div class="ic ic-loop">&#8635;</div>
      <div class="item-text">운 <span class="em">No!</span> 반복 패턴</div>
    </div>
    <div class="item">
      <div class="ic ic-podium"><span class="p1"></span><span class="p2"></span><span class="p3"></span></div>
      <div class="item-text">Top3: 루즈콜&#183;포지션무시&#183;틸트</div>
    </div>
    <div class="item">
      <div class="ic ic-check">&#10003;</div>
      <div class="item-text">즉시 교정법</div>
    </div>
  </div>

  <div class="site">holdemmaster.com</div>
  <div class="wordmark">&#9824;HoldemMaster</div>
</div>
</body>
</html>
