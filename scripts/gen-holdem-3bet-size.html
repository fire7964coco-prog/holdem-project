<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:#0B1F17; }
.stage {
  position:relative; width:1200px; height:675px; overflow:hidden; padding:44px;
  background:
    radial-gradient(ellipse 900px 500px at 50% -10%, rgba(46,125,70,0.26), rgba(46,125,70,0) 65%),
    linear-gradient(160deg,#0B1F17 0%,#13291D 100%);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  display:flex; flex-direction:column; align-items:center;
}
.kicker { color:#C9A227; font-size:16px; font-weight:700; letter-spacing:.3em; text-transform:uppercase; text-align:center; margin-bottom:8px; }
h1 { color:#F2EEE3; font-size:44px; font-weight:800; text-align:center; text-shadow:0 2px 12px rgba(0,0,0,.45); margin-bottom:24px; }
h1 .gold { color:#C9A227; }
.cols { display:flex; align-items:flex-end; gap:60px; }
.col {
  width:400px; display:flex; flex-direction:column; align-items:center;
  background:rgba(0,0,0,.28); border:2px solid rgba(201,162,39,.55); border-radius:16px;
  padding:22px 20px 20px;
}
.pos { color:#F2EEE3; font-size:34px; font-weight:900; letter-spacing:.1em; margin-bottom:4px; }
.mult { color:#C9A227; font-size:52px; font-weight:900; line-height:1.05; margin-bottom:14px; }
.stack { display:flex; flex-direction:column-reverse; align-items:center; margin-bottom:16px; }
.chip {
  width:86px; height:17px; border-radius:9px; margin-top:-5px;
  background:linear-gradient(180deg,#e0bb4a,#96781e); border:2px solid #F2EEE3;
  box-shadow:0 2px 5px rgba(0,0,0,.4);
}
.chip.dark { background:linear-gradient(180deg,#3d5c48,#1d3527); }
.bb {
  background:#C9A227; color:#0B1F17; font-weight:900; font-size:26px;
  padding:6px 22px; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,.4);
}
.vs { color:#F2EEE3; font-size:30px; font-weight:900; opacity:.85; margin-bottom:210px; }
.wordmark { position:absolute; right:44px; bottom:44px; color:#C9A227; font-size:15px; font-weight:800; letter-spacing:.04em; opacity:.9; }
</style>
</head>
<body>
<div class="stage">
  <div class="kicker">3-Bet Sizing</div>
  <h1>IP <span class="gold">x3</span> &nbsp;vs&nbsp; OOP <span class="gold">x4</span></h1>
  <div class="cols">
    <div class="col">
      <div class="pos">IP</div>
      <div class="mult">x3</div>
      <div class="stack">
        <div class="chip"></div><div class="chip dark"></div><div class="chip"></div>
        <div class="chip dark"></div><div class="chip"></div><div class="chip dark"></div>
        <div class="chip"></div><div class="chip dark"></div><div class="chip"></div>
      </div>
      <div class="bb">3BB &#8594; 9BB</div>
    </div>
    <div class="vs">VS</div>
    <div class="col">
      <div class="pos">OOP</div>
      <div class="mult">x4</div>
      <div class="stack">
        <div class="chip"></div><div class="chip dark"></div><div class="chip"></div>
        <div class="chip dark"></div><div class="chip"></div><div class="chip dark"></div>
        <div class="chip"></div><div class="chip dark"></div><div class="chip"></div>
        <div class="chip dark"></div><div class="chip"></div><div class="chip dark"></div>
      </div>
      <div class="bb">3BB &#8594; 12BB</div>
    </div>
  </div>
  <div class="wordmark">&#9824;HoldemMaster</div>
</div>
</body>
</html>
