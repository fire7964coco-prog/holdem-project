<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:#0B1F17; }
.stage {
  position:relative; width:1200px; height:675px; overflow:hidden; padding:44px;
  background:
    radial-gradient(ellipse 900px 500px at 50% -10%, rgba(46,125,70,0.26), rgba(46,125,70,0) 65%),
    linear-gradient(160deg,#0B1F17 0%,#13291D 100%);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  display:flex; flex-direction:column; align-items:flex-start;
}
.kicker { color:#C9A227; font-size:15px; font-weight:700; letter-spacing:.28em; text-transform:uppercase; margin-bottom:6px; }
h1 { color:#F2EEE3; font-size:42px; font-weight:800; text-shadow:0 2px 12px rgba(0,0,0,.45); margin-bottom:24px; }
h1 .gold { color:#C9A227; }
.rows { display:flex; flex-direction:column; gap:15px; width:850px; }
.row {
  display:flex; align-items:center; gap:18px;
  background:rgba(0,0,0,.28); border:2px solid rgba(201,162,39,.55); border-radius:16px;
  padding:15px 24px;
}
.qicon {
  flex:0 0 60px; width:60px; height:48px; border-radius:24px;
  background:#C9A227; color:#0B1F17; font-weight:900; font-size:24px;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 4px 10px rgba(0,0,0,.4);
}
.q { color:#F2EEE3; font-size:25px; font-weight:800; width:330px; }
.divider { flex:0 0 2px; height:40px; background:linear-gradient(180deg, rgba(201,162,39,0), #C9A227, rgba(201,162,39,0)); }
.a { color:#C9A227; font-size:25px; font-weight:800; flex:1; }
.cards { position:absolute; right:116px; top:236px; }
.card { position:absolute; width:96px; height:138px; background:linear-gradient(175deg,#FDFBF4 0%,#F2EEE3 100%); border-radius:10px; box-shadow:0 6px 14px rgba(0,0,0,.45),0 1px 3px rgba(0,0,0,.3); }
.card .corner { position:absolute; top:7px; left:9px; font-size:25px; font-weight:800; line-height:1; text-align:center; }
.card .corner .csuit { display:block; font-size:17px; line-height:1; margin-top:1px; }
.card .big { position:absolute; top:50%; left:50%; transform:translate(-42%,-44%); font-size:60px; line-height:1; }
.black { color:#1a1a1a; } .red { color:#c0392b; }
.c1 { transform:rotate(-10deg); left:-58px; top:0; }
.c2 { transform:rotate(9deg); left:30px; top:13px; }
.wordmark { position:absolute; right:44px; bottom:44px; color:#C9A227; font-size:15px; font-weight:800; letter-spacing:.04em; opacity:.9; }
</style>
</head>
<body>
<div class="stage">
  <div class="kicker">Check-Raise</div>
  <h1>체크레이즈 <span class="gold">자주 묻는 질문</span></h1>
  <div class="rows">
    <div class="row">
      <div class="qicon">Q1</div>
      <div class="q">체크레이즈는 비매너?</div>
      <div class="divider"></div>
      <div class="a">아니다 &#8212; 정상 전략</div>
    </div>
    <div class="row">
      <div class="qicon">Q2</div>
      <div class="q">체크레이즈에 3벳?</div>
      <div class="divider"></div>
      <div class="a">최상위 핸드로만</div>
    </div>
    <div class="row">
      <div class="qicon">Q3</div>
      <div class="q">적정 빈도는?</div>
      <div class="divider"></div>
      <div class="a">10~15%</div>
    </div>
    <div class="row">
      <div class="qicon">Q4</div>
      <div class="q">왜 OOP에서 효율적?</div>
      <div class="divider"></div>
      <div class="a">포지션 열세 보완</div>
    </div>
  </div>
  <div class="cards">
    <div class="card c1"><div class="corner black">J<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
    <div class="card c2"><div class="corner red">J<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
  </div>
  <div class="wordmark">&#9824;HoldemMaster</div>
</div>
</body>
</html>
