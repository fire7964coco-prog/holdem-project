<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:#0B1F17; }
.stage {
  position:relative; width:1200px; height:675px; overflow:hidden; padding:40px 44px;
  background:
    radial-gradient(ellipse 900px 500px at 50% -10%, rgba(46,125,70,0.26), rgba(46,125,70,0) 65%),
    linear-gradient(160deg,#0B1F17 0%,#13291D 100%);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  display:flex; flex-direction:column; align-items:center; gap:16px;
}
h1 { color:#F2EEE3; font-size:42px; font-weight:800; text-align:center; text-shadow:0 2px 12px rgba(0,0,0,.45); }
h1 .gold { color:#C9A227; }
.wordmark { position:absolute; right:44px; bottom:26px; color:#C9A227; font-size:15px; font-weight:800; letter-spacing:.04em; opacity:.9; }

.row {
  display:flex; align-items:center; gap:26px;
  background:rgba(0,0,0,.28); border:2px solid rgba(201,162,39,.55); border-radius:16px; padding:14px 26px;
}
.row.win { border-color:#C9A227; box-shadow:0 0 24px rgba(201,162,39,.25); }
.rlabel { width:170px; color:#F2EEE3; font-size:26px; font-weight:800; }
.row.win .rlabel { color:#C9A227; }
.cards { display:flex; gap:10px; }

.callout { display:flex; flex-direction:column; align-items:center; gap:8px; margin-top:2px; }
.tri { width:0; height:0; border-left:14px solid transparent; border-right:14px solid transparent; border-bottom:16px solid #C9A227; }
.verdict { background:linear-gradient(180deg,#E8C95A,#C9A227); color:#0B1F17; font-size:28px; font-weight:900; padding:9px 34px; border-radius:12px; box-shadow:0 8px 20px rgba(0,0,0,.45); }
.subnote { color:#F2EEE3; font-size:20px; font-weight:700; background:rgba(242,238,227,.12); border:1px solid rgba(201,162,39,.5); padding:5px 20px; border-radius:999px; }

.card { position:relative; width:82px; height:118px; background:linear-gradient(175deg,#FDFBF4 0%,#F2EEE3 100%); border-radius:9px; box-shadow:0 6px 14px rgba(0,0,0,.45),0 1px 3px rgba(0,0,0,.3); }
.card .corner { position:absolute; top:6px; left:8px; font-size:21px; font-weight:800; line-height:1; text-align:center; }
.card .corner .csuit { display:block; font-size:14px; line-height:1; margin-top:1px; }
.card .big { position:absolute; top:50%; left:50%; transform:translate(-42%,-44%); font-size:48px; line-height:1; }
.card.hi { outline:3px solid #C9A227; outline-offset:-3px; }
.red { color:#c0392b; } .black { color:#1a1a1a; }
</style>
</head>
<body>
<div class="stage">
  <h1>플러시 <span class="gold">타이브레이크</span> 규칙</h1>
  <div class="row win">
    <div class="rlabel">플레이어 A</div>
    <div class="cards">
      <div class="card hi"><div class="corner red">A<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
      <div class="card"><div class="corner red">J<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
      <div class="card"><div class="corner red">9<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
      <div class="card"><div class="corner red">6<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
      <div class="card"><div class="corner red">3<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
    </div>
  </div>
  <div class="row">
    <div class="rlabel">플레이어 B</div>
    <div class="cards">
      <div class="card hi"><div class="corner red">K<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
      <div class="card"><div class="corner red">Q<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
      <div class="card"><div class="corner red">10<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
      <div class="card"><div class="corner red">8<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
      <div class="card"><div class="corner red">4<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
    </div>
  </div>
  <div class="callout">
    <div class="tri"></div>
    <div class="verdict">A 승 — 높은 카드부터 비교</div>
    <div class="subnote">무늬 서열 없음</div>
  </div>
  <div class="wordmark">&#9824;HoldemMaster</div>
</div>
</body>
</html>
