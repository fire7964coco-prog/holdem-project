<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dirty Outs</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #0B1F17; }
  #frame {
    position: relative;
    width: 1200px;
    height: 675px;
    overflow: hidden;
    background: linear-gradient(160deg, #0B1F17 0%, #13291D 55%, #0B1F17 100%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 44px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
  }
  .glow {
    position: absolute;
    left: 50%; top: 46%;
    width: 940px; height: 520px;
    transform: translate(-50%, -50%);
    background: radial-gradient(ellipse at center, rgba(46,125,70,0.26) 0%, rgba(46,125,70,0.0) 65%);
    pointer-events: none;
  }
  .title {
    position: relative;
    color: #F2EEE3;
    font-size: 40px;
    font-weight: 800;
    letter-spacing: 0.02em;
    text-align: center;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  .title .bad { color: #B4462E; }
  .label {
    color: #C9A227;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.28em;
    text-align: center;
    margin-bottom: 12px;
  }
  .board-row {
    display: flex;
    gap: 18px;
    justify-content: center;
  }
  .card {
    position: relative;
    width: 100px;
    height: 144px;
    background: linear-gradient(175deg, #FDFBF4 0%, #F2EEE3 100%);
    border-radius: 10px;
    box-shadow: 0 6px 14px rgba(0,0,0,0.45), 0 1px 3px rgba(0,0,0,0.3);
  }
  .card .corner {
    position: absolute;
    top: 7px;
    left: 9px;
    font-size: 26px;
    font-weight: 800;
    line-height: 1.0;
    text-align: center;
  }
  .card .corner .csuit {
    display: block;
    font-size: 18px;
    line-height: 1.0;
    margin-top: 1px;
  }
  .card .big {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-42%, -44%);
    font-size: 62px;
    line-height: 1;
  }
  .black { color: #1a1a1a; }
  .red { color: #c0392b; }
  .board-wrap { position: relative; }
  .pills {
    position: relative;
    display: flex;
    align-items: center;
    gap: 26px;
  }
  .pill {
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 0.08em;
    padding: 12px 34px;
    border-radius: 999px;
    white-space: nowrap;
    box-shadow: 0 5px 14px rgba(0,0,0,0.4);
  }
  .pill.clean {
    background: linear-gradient(175deg, #379453 0%, #2E7D46 100%);
    color: #F2EEE3;
  }
  .pill.dirty {
    background: linear-gradient(175deg, #C45238 0%, #B4462E 100%);
    color: #F2EEE3;
  }
  .caption {
    position: relative;
    color: #F2EEE3;
    font-size: 20px;
    font-weight: 500;
    text-align: center;
    opacity: 0.92;
    white-space: nowrap;
  }
  .caption b { color: #C9A227; font-weight: 800; }
  .wordmark {
    position: absolute;
    right: 44px;
    bottom: 44px;
    color: #C9A227;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.04em;
    opacity: 0.9;
  }
</style>
</head>
<body>
<div id="frame">
  <div class="glow"></div>

  <div class="title"><span class="bad">Dirty</span> Outs</div>

  <div class="board-wrap">
    <div class="label">THE BOARD</div>
    <div class="board-row">
      <div class="card"><div class="corner black">10<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
      <div class="card"><div class="corner red">8<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
      <div class="card"><div class="corner black">4<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
      <div class="card"><div class="corner black">4<span class="csuit">&#9827;</span></div><div class="big black">&#9827;</div></div>
      <div class="card"><div class="corner red">6<span class="csuit">&#9830;</span></div><div class="big red">&#9830;</div></div>
    </div>
  </div>

  <div class="pills">
    <div class="pill clean">CLEAN OUT &#10003;</div>
    <div class="pill dirty">DIRTY OUT &#10007;</div>
  </div>

  <div class="caption">Some &ldquo;outs&rdquo; also improve your opponent &mdash; count <b>clean outs</b> only.</div>

  <div class="wordmark">&#9824;HoldemMaster</div>
</div>
</body>
</html>
