<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:#0B1F17; }
.stage {
  position:relative; width:1200px; height:675px; overflow:hidden; padding:44px;
  background:
    radial-gradient(ellipse 900px 500px at 50% -10%, rgba(46,125,70,0.26), rgba(46,125,70,0) 65%),
    linear-gradient(160deg,#0B1F17 0%,#13291D 100%);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  display:flex; flex-direction:column; align-items:center;
}
h1 { color:#F2EEE3; font-size:44px; font-weight:800; text-align:center; text-shadow:0 2px 12px rgba(0,0,0,.45); }
h1 .gold { color:#C9A227; }
.wordmark { position:absolute; right:44px; bottom:30px; color:#C9A227; font-size:15px; font-weight:800; letter-spacing:.04em; opacity:.9; }

.duel { display:flex; align-items:stretch; justify-content:center; gap:24px; margin:auto 0; }
.side {
  width:486px; background:rgba(0,0,0,.28); border:2px solid rgba(201,162,39,.55); border-radius:16px;
  padding:22px 20px 24px; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; gap:18px;
}
.side.win { border-color:#C9A227; box-shadow:0 0 26px rgba(201,162,39,.25); }
.crownwrap { display:flex; flex-direction:column; align-items:center; gap:8px; margin-bottom:2px; }
.crown { width:66px; height:42px; background:linear-gradient(180deg,#E8C95A,#C9A227);
  clip-path:polygon(0% 100%, 0% 22%, 26% 52%, 50% 0%, 74% 52%, 100% 22%, 100% 100%); }
.winbadge { background:#C9A227; color:#0B1F17; font-size:22px; font-weight:900; padding:6px 20px; border-radius:999px; }
.vs {
  align-self:center; width:104px; height:104px; border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #E8C95A, #C9A227 60%, #8F6F14);
  color:#0B1F17; font-size:42px; font-weight:900; display:flex; align-items:center; justify-content:center;
  box-shadow:0 8px 22px rgba(0,0,0,.5), 0 0 0 4px rgba(201,162,39,.3); flex-shrink:0;
}
.cards { display:flex; gap:8px; }
.handlabel { color:#F2EEE3; font-size:26px; font-weight:800; text-align:center; }
.handlabel .num { color:#C9A227; }

.card { position:relative; width:82px; height:118px; background:linear-gradient(175deg,#FDFBF4 0%,#F2EEE3 100%); border-radius:9px; box-shadow:0 6px 14px rgba(0,0,0,.45),0 1px 3px rgba(0,0,0,.3); }
.card .corner { position:absolute; top:6px; left:8px; font-size:21px; font-weight:800; line-height:1; text-align:center; }
.card .corner .csuit { display:block; font-size:14px; line-height:1; margin-top:1px; }
.card .big { position:absolute; top:50%; left:50%; transform:translate(-42%,-44%); font-size:48px; line-height:1; }
.black { color:#1a1a1a; } .red { color:#c0392b; }
</style>
</head>
<body>
<div class="stage">
  <h1>플러시 vs 스트레이트 — <span class="gold">누가 이길까?</span></h1>
  <div class="duel">
    <div class="side win">
      <div class="crownwrap">
        <div class="crown"></div>
        <div class="winbadge">플러시 승</div>
      </div>
      <div class="cards">
        <div class="card"><div class="corner red">A<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
        <div class="card"><div class="corner red">Q<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
        <div class="card"><div class="corner red">9<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
        <div class="card"><div class="corner red">6<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
        <div class="card"><div class="corner red">2<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
      </div>
      <div class="handlabel">플러시 <span class="num">(5,108 조합)</span></div>
    </div>
    <div class="vs">VS</div>
    <div class="side">
      <div class="cards">
        <div class="card"><div class="corner black">9<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
        <div class="card"><div class="corner red">8<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
        <div class="card"><div class="corner red">7<span class="csuit">&#9830;</span></div><div class="big red">&#9830;</div></div>
        <div class="card"><div class="corner black">6<span class="csuit">&#9827;</span></div><div class="big black">&#9827;</div></div>
        <div class="card"><div class="corner black">5<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
      </div>
      <div class="handlabel">스트레이트 <span class="num">(10,200 조합)</span></div>
    </div>
  </div>
  <div class="wordmark">&#9824;HoldemMaster</div>
</div>
</body>
</html>
