<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:#F5F0E4; }
.stage {
  position:relative; width:1200px; height:675px; overflow:hidden; padding:36px 44px 36px 74px;
  background:
    radial-gradient(ellipse 800px 400px at 50% -10%, rgba(176,58,46,0.07), rgba(176,58,46,0) 60%),
    linear-gradient(165deg,#F7F2E7 0%,#F1EBDC 100%);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  color:#26311f;
}
.spiral { position:absolute; left:20px; top:0; bottom:0; width:24px; display:flex; flex-direction:column; justify-content:space-evenly; }
.spiral span { display:block; width:20px; height:20px; border-radius:50%; border:3px solid #B7AE97; background:#F5F0E4; box-shadow:inset 0 2px 3px rgba(0,0,0,.18); }
.kicker { color:#b03a2e; font-size:14px; font-weight:800; letter-spacing:.26em; text-transform:uppercase; margin-bottom:6px; }
h1 { color:#26311f; font-size:40px; font-weight:800; line-height:1.1; margin-bottom:8px; }
h1 .gold { color:#C9A227; }
h1 .warn { color:#b03a2e; }
.rule { width:120px; height:5px; background:#b03a2e; border-radius:3px; margin-bottom:20px; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:14px 20px; }
.sec { display:flex; gap:14px; align-items:flex-start; background:#FDFBF4; border:2px solid rgba(176,58,46,.4); border-radius:14px; padding:15px 17px; min-height:126px; }
.sec.wide { grid-column:1 / -1; min-height:0; padding:14px 17px; }
.nb { flex:0 0 auto; width:42px; height:42px; border-radius:50%; background:#b03a2e; color:#F5F0E4; font-size:19px; font-weight:900; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 5px rgba(38,49,31,.25); }
.st { font-size:20px; font-weight:800; color:#26311f; line-height:1.2; margin-bottom:6px; }
.sd { font-size:15px; font-weight:600; color:#4a5a3f; line-height:1.35; }
.sd .em { color:#b03a2e; font-weight:800; }
.sd .pct { color:#8a6d13; font-weight:800; }
.minis { display:flex; gap:6px; margin-top:8px; }
.mcard { position:relative; width:46px; height:64px; background:#FDFBF4; border:2px solid #26311f; border-radius:6px; box-shadow:1px 2px 0 rgba(38,49,31,.22); }
.mcard .corner { position:absolute; top:3px; left:5px; font-size:13px; font-weight:800; line-height:1; text-align:center; }
.mcard .corner .csuit { display:block; font-size:10px; line-height:1; margin-top:1px; }
.mcard .big { position:absolute; top:54%; left:54%; transform:translate(-42%,-44%); font-size:24px; line-height:1; }
.black { color:#1a1a1a; } .red { color:#c0392b; }
.wordmark { position:absolute; right:44px; bottom:24px; color:#C9A227; font-size:15px; font-weight:800; letter-spacing:.04em; opacity:.95; }
</style>
</head>
<body>
<div class="stage">
  <div class="spiral"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
  <div class="kicker">Holdem Note</div>
  <h1><span class="gold">AA</span> 셋업 당하는 <span class="warn">5가지</span></h1>
  <div class="rule"></div>
  <div class="grid">
    <div class="sec">
      <div class="nb">1</div>
      <div>
        <div class="st">상대 포켓페어가 세트 완성</div>
        <div class="sd">플랍에서 세트 뜰 확률 <span class="pct">11.8%</span> — AA가 뒤집힌다</div>
      </div>
    </div>
    <div class="sec">
      <div class="nb">2</div>
      <div>
        <div class="st">연결된 보드</div>
        <div class="sd"><span class="em">스트레이트 위험</span> 최고 구간</div>
        <div class="minis">
          <div class="mcard"><div class="corner black">7<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
          <div class="mcard"><div class="corner red">8<span class="csuit">&#9830;</span></div><div class="big red">&#9830;</div></div>
          <div class="mcard"><div class="corner black">9<span class="csuit">&#9827;</span></div><div class="big black">&#9827;</div></div>
        </div>
      </div>
    </div>
    <div class="sec">
      <div class="nb">3</div>
      <div>
        <div class="st">멀티웨이 팟</div>
        <div class="sd">상대가 많으면 <span class="em">투페어 이상</span>이 어딘가에서 완성된다</div>
      </div>
    </div>
    <div class="sec">
      <div class="nb">4</div>
      <div>
        <div class="st">림프 함정</div>
        <div class="sd">팟을 안 키우면 <span class="em">잡핸드 전부 초대</span> — 셋업의 시작</div>
      </div>
    </div>
    <div class="sec wide">
      <div class="nb">5</div>
      <div>
        <div class="st">AA vs AA</div>
        <div class="sd">확률 <span class="pct">0.4% 미만</span>의 초레어 쿨러 — 만나면 피할 방법이 없다</div>
      </div>
    </div>
  </div>
  <div class="wordmark">&#9824;HoldemMaster</div>
</div>
</body>
</html>
