<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:#0B1F17; }
.stage {
  position:relative; width:1200px; height:675px; overflow:hidden; padding:32px 44px 36px;
  background:
    radial-gradient(ellipse 900px 500px at 50% -10%, rgba(46,125,70,0.26), rgba(46,125,70,0) 65%),
    radial-gradient(ellipse 700px 420px at 50% 60%, rgba(57,255,122,0.07), rgba(57,255,122,0) 70%),
    linear-gradient(160deg,#081712 0%,#10231A 100%);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  display:flex; flex-direction:column; align-items:center; justify-content:space-between;
}
.wordmark { position:absolute; right:44px; bottom:22px; color:#C9A227; font-size:15px; font-weight:800; letter-spacing:.04em; opacity:.9; }

.row { display:flex; flex-direction:column; align-items:center; }
.rlabel { color:#C9A227; font-size:17px; font-weight:800; letter-spacing:.18em; margin-bottom:10px; }
.cards { display:flex; gap:12px; }

/* 네온 게이지 */
.gauge-wrap { display:flex; align-items:center; gap:26px; }
.gauge { position:relative; width:168px; height:168px; border-radius:50%;
  background:conic-gradient(#39FF6A 0deg 126deg, rgba(242,238,227,.10) 126deg 360deg);
  box-shadow:0 0 34px rgba(57,255,122,.4), inset 0 0 18px rgba(0,0,0,.5);
  display:flex; align-items:center; justify-content:center; }
.gauge .hole { width:126px; height:126px; border-radius:50%; background:#0B1F17;
  display:flex; align-items:center; justify-content:center;
  box-shadow:inset 0 0 16px rgba(0,0,0,.7); }
.gauge .pct { color:#39FF6A; font-size:44px; font-weight:900; text-shadow:0 0 16px rgba(57,255,122,.75); }
.gauge-caption { color:#F2EEE3; font-size:22px; font-weight:800; line-height:1.4; }
.gauge-caption .neon { color:#39FF6A; text-shadow:0 0 12px rgba(57,255,122,.6); }

/* 카드 (§13 안전: 코너 랭크 + 단일 수트 글리프) */
.card { position:relative; width:82px; height:118px; background:linear-gradient(175deg,#FDFBF4 0%,#F2EEE3 100%); border-radius:9px; box-shadow:0 6px 14px rgba(0,0,0,.45),0 1px 3px rgba(0,0,0,.3); }
.card .corner { position:absolute; top:6px; left:8px; font-size:21px; font-weight:800; line-height:1; text-align:center; }
.card .corner .csuit { display:block; font-size:14px; line-height:1; margin-top:1px; }
.card .big { position:absolute; top:50%; left:50%; transform:translate(-42%,-44%); font-size:48px; line-height:1; }
.black { color:#1a1a1a; } .red { color:#c0392b; }
.hole-cards .card { width:104px; height:150px; border-radius:11px; box-shadow:0 10px 24px rgba(0,0,0,.55), 0 0 22px rgba(57,255,122,.18); }
.hole-cards .card .corner { font-size:27px; }
.hole-cards .card .corner .csuit { font-size:18px; }
.hole-cards .card .big { font-size:64px; }
.hole-cards .card:nth-child(1) { transform:rotate(-5deg); }
.hole-cards .card:nth-child(2) { transform:rotate(5deg); }
</style>
</head>
<body>
<div class="stage">
  <div class="row">
    <div class="rlabel">보드</div>
    <div class="cards">
      <div class="card"><div class="corner red">K<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
      <div class="card"><div class="corner red">7<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
      <div class="card"><div class="corner black">2<span class="csuit">&#9827;</span></div><div class="big black">&#9827;</div></div>
    </div>
  </div>

  <div class="gauge-wrap">
    <div class="gauge"><div class="hole"><div class="pct">35%</div></div></div>
    <div class="gauge-caption">플러시 드로우<br><span class="neon">리버까지 완성 확률</span></div>
  </div>

  <div class="row">
    <div class="rlabel">홀카드</div>
    <div class="cards hole-cards">
      <div class="card"><div class="corner red">A<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
      <div class="card"><div class="corner red">9<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
    </div>
  </div>

  <div class="wordmark">&#9824;HoldemMaster</div>
</div>
</body>
</html>
