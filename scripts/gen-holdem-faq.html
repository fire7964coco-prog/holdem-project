<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:#0B1F17; }
.stage {
  position:relative; width:1200px; height:675px; overflow:hidden; padding:40px 44px 44px;
  background:
    radial-gradient(ellipse 900px 500px at 50% -10%, rgba(46,125,70,0.26), rgba(46,125,70,0) 65%),
    linear-gradient(160deg,#0B1F17 0%,#13291D 100%);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  display:flex; flex-direction:column; align-items:center;
}
.kicker { color:#C9A227; font-size:15px; font-weight:700; letter-spacing:.28em; text-align:center; margin-bottom:6px; }
h1 { color:#F2EEE3; font-size:42px; font-weight:800; text-align:center; text-shadow:0 2px 12px rgba(0,0,0,.45); margin-bottom:24px; }
h1 .gold { color:#C9A227; }
.wordmark { position:absolute; right:44px; bottom:24px; color:#C9A227; font-size:15px; font-weight:800; letter-spacing:.04em; opacity:.9; }

.content { display:flex; gap:28px; width:100%; align-items:stretch; }

/* 좌측 Q&A */
.qa-col { width:552px; display:flex; flex-direction:column; gap:14px; }
.qa { display:flex; align-items:center; gap:14px; background:rgba(0,0,0,.28); border:2px solid rgba(201,162,39,.55); border-radius:16px; padding:16px 18px; }
.qbadge { flex:none; width:40px; height:40px; border-radius:50%; background:#C9A227; color:#0B1F17; font-weight:900; font-size:21px; display:flex; align-items:center; justify-content:center; }
.qtext { flex:1; color:#F2EEE3; font-size:21px; font-weight:700; line-height:1.25; }
.achip { flex:none; background:rgba(201,162,39,.16); border:1.5px solid #C9A227; color:#C9A227; font-size:18px; font-weight:800; border-radius:999px; padding:8px 16px; white-space:nowrap; }

/* 우측 족보 비교 패널 */
.panel { flex:1; background:rgba(0,0,0,.28); border:2px solid rgba(201,162,39,.55); border-radius:16px; padding:20px 22px 18px; display:flex; flex-direction:column; align-items:center; justify-content:space-between; }
.panel-title { color:#C9A227; font-size:19px; font-weight:800; letter-spacing:.04em; margin-bottom:6px; }
.hand-row { display:flex; flex-direction:column; align-items:center; gap:8px; }
.hand-label { display:flex; align-items:center; gap:10px; }
.hand-name { color:#F2EEE3; font-size:19px; font-weight:800; }
.win { background:#C9A227; color:#0B1F17; font-size:15px; font-weight:900; border-radius:999px; padding:3px 12px; }
.cards { display:flex; gap:8px; }
.vs { color:#C9A227; font-size:20px; font-weight:900; letter-spacing:.12em; margin:6px 0; }

/* 카드 (§13 안전: 코너 랭크 + 단일 수트 글리프) */
.card { position:relative; width:68px; height:98px; background:linear-gradient(175deg,#FDFBF4 0%,#F2EEE3 100%); border-radius:8px; box-shadow:0 6px 14px rgba(0,0,0,.45),0 1px 3px rgba(0,0,0,.3); }
.card .corner { position:absolute; top:6px; left:7px; font-size:18px; font-weight:800; line-height:1; text-align:center; }
.card .corner .csuit { display:block; font-size:13px; line-height:1; margin-top:1px; }
.card .big { position:absolute; top:50%; left:50%; transform:translate(-42%,-44%); font-size:40px; line-height:1; }
.black { color:#1a1a1a; } .red { color:#c0392b; }
</style>
</head>
<body>
<div class="stage">
  <div class="kicker">자주 묻는 질문</div>
  <h1>홀덤 핵심 <span class="gold">Q&amp;A</span></h1>

  <div class="content">
    <div class="qa-col">
      <div class="qa"><div class="qbadge">Q</div><div class="qtext">플러시 vs 스트레이트?</div><div class="achip">플러시 승</div></div>
      <div class="qa"><div class="qbadge">Q</div><div class="qtext">풀하우스 vs 플러시?</div><div class="achip">풀하우스 승</div></div>
      <div class="qa"><div class="qbadge">Q</div><div class="qtext">같은 플러시끼리는?</div><div class="achip">높은 카드부터 비교</div></div>
      <div class="qa"><div class="qbadge">Q</div><div class="qtext">무늬 서열이 있나?</div><div class="achip">없음</div></div>
    </div>

    <div class="panel">
      <div class="panel-title">스트레이트 플러시 vs 포카드</div>
      <div class="hand-row">
        <div class="hand-label"><span class="hand-name">스트레이트 플러시</span><span class="win">승</span></div>
        <div class="cards">
          <div class="card"><div class="corner red">9<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
          <div class="card"><div class="corner red">8<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
          <div class="card"><div class="corner red">7<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
          <div class="card"><div class="corner red">6<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
          <div class="card"><div class="corner red">5<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
        </div>
      </div>
      <div class="vs">VS</div>
      <div class="hand-row">
        <div class="hand-label"><span class="hand-name">포카드</span></div>
        <div class="cards">
          <div class="card"><div class="corner black">2<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
          <div class="card"><div class="corner red">2<span class="csuit">&#9830;</span></div><div class="big red">&#9830;</div></div>
          <div class="card"><div class="corner black">2<span class="csuit">&#9827;</span></div><div class="big black">&#9827;</div></div>
          <div class="card"><div class="corner red">2<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
          <div class="card"><div class="corner black">K<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="wordmark">&#9824;HoldemMaster</div>
</div>
</body>
</html>
