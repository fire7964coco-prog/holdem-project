<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:#0B1F17; }
.stage {
  position:relative; width:1200px; height:675px; overflow:hidden; padding:44px;
  background:
    radial-gradient(ellipse 900px 500px at 50% -10%, rgba(46,125,70,0.26), rgba(46,125,70,0) 65%),
    linear-gradient(160deg,#0B1F17 0%,#13291D 100%);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  display:flex; flex-direction:column; align-items:flex-start;
}
.kicker { color:#C9A227; font-size:15px; font-weight:700; letter-spacing:.28em; text-transform:uppercase; margin-bottom:6px; }
h1 { color:#F2EEE3; font-size:40px; font-weight:800; text-shadow:0 2px 12px rgba(0,0,0,.45); margin-bottom:20px; }
h1 .gold { color:#C9A227; }
.rows { display:flex; flex-direction:column; gap:11px; width:860px; }
.row {
  display:flex; align-items:center; gap:16px;
  background:rgba(0,0,0,.28); border:2px solid rgba(201,162,39,.55); border-radius:14px;
  padding:11px 20px;
}
.qicon {
  flex:0 0 42px; width:42px; height:42px; border-radius:50%;
  background:#C9A227; color:#0B1F17; font-weight:900; font-size:24px;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 4px 10px rgba(0,0,0,.4);
}
.q { color:#F2EEE3; font-size:23px; font-weight:800; width:320px; }
.divider { flex:0 0 2px; height:36px; background:linear-gradient(180deg, rgba(201,162,39,0), #C9A227, rgba(201,162,39,0)); }
.a { color:#C9A227; font-size:23px; font-weight:800; flex:1; }
.cards { position:absolute; right:112px; top:250px; }
.card { position:absolute; width:96px; height:138px; background:linear-gradient(175deg,#FDFBF4 0%,#F2EEE3 100%); border-radius:10px; box-shadow:0 6px 14px rgba(0,0,0,.45),0 1px 3px rgba(0,0,0,.3); }
.card .corner { position:absolute; top:7px; left:9px; font-size:25px; font-weight:800; line-height:1; text-align:center; }
.card .corner .csuit { display:block; font-size:17px; line-height:1; margin-top:1px; }
.card .big { position:absolute; top:50%; left:50%; transform:translate(-42%,-44%); font-size:60px; line-height:1; }
.black { color:#1a1a1a; } .red { color:#c0392b; }
.c1 { transform:rotate(-11deg); left:-58px; top:0; }
.c2 { transform:rotate(10deg); left:30px; top:14px; }
.wordmark { position:absolute; right:44px; bottom:44px; color:#C9A227; font-size:15px; font-weight:800; letter-spacing:.04em; opacity:.9; }
</style>
</head>
<body>
<div class="stage">
  <div class="kicker">Holdem Check</div>
  <h1>홀덤 체크 FAQ <span class="gold">핵심 요약</span></h1>
  <div class="rows">
    <div class="row">
      <div class="qicon">Q</div>
      <div class="q">체크 vs 패스?</div>
      <div class="divider"></div>
      <div class="a">같은 뜻 &#183; 정식 용어는 체크</div>
    </div>
    <div class="row">
      <div class="qicon">Q</div>
      <div class="q">체크 후 폴드 가능?</div>
      <div class="divider"></div>
      <div class="a">베팅 나오면 폴드 가능</div>
    </div>
    <div class="row">
      <div class="qicon">Q</div>
      <div class="q">두 명 다 체크하면?</div>
      <div class="divider"></div>
      <div class="a">무료로 다음 카드 공개</div>
    </div>
    <div class="row">
      <div class="qicon">Q</div>
      <div class="q">온라인 체크는?</div>
      <div class="divider"></div>
      <div class="a">체크 버튼 = 베팅 0</div>
    </div>
    <div class="row">
      <div class="qicon">Q</div>
      <div class="q">체크 vs 체크레이즈?</div>
      <div class="divider"></div>
      <div class="a">체크 후 레이즈 = 공격 전환</div>
    </div>
  </div>
  <div class="cards">
    <div class="card c1"><div class="corner red">A<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
    <div class="card c2"><div class="corner black">K<span class="csuit">&#9827;</span></div><div class="big black">&#9827;</div></div>
  </div>
  <div class="wordmark">&#9824;HoldemMaster</div>
</div>
</body>
</html>
