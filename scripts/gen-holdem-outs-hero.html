<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Counting Your Outs</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #0B1F17; }
  #frame {
    position: relative;
    width: 1200px;
    height: 675px;
    overflow: hidden;
    background: linear-gradient(160deg, #0B1F17 0%, #13291D 55%, #0B1F17 100%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 44px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
  }
  .glow {
    position: absolute;
    left: 50%; top: 46%;
    width: 940px; height: 520px;
    transform: translate(-50%, -50%);
    background: radial-gradient(ellipse at center, rgba(46,125,70,0.26) 0%, rgba(46,125,70,0.0) 65%);
    pointer-events: none;
  }
  .title {
    position: relative;
    color: #F2EEE3;
    font-size: 38px;
    font-weight: 800;
    letter-spacing: 0.02em;
    text-align: center;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  .title .gold { color: #C9A227; }
  .label {
    color: #C9A227;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.28em;
    text-align: center;
    margin-bottom: 10px;
  }
  .board-row {
    display: flex;
    gap: 16px;
    justify-content: center;
  }
  .card {
    position: relative;
    width: 100px;
    height: 144px;
    background: linear-gradient(175deg, #FDFBF4 0%, #F2EEE3 100%);
    border-radius: 10px;
    box-shadow: 0 6px 14px rgba(0,0,0,0.45), 0 1px 3px rgba(0,0,0,0.3);
  }
  .card .corner {
    position: absolute;
    top: 7px;
    left: 9px;
    font-size: 26px;
    font-weight: 800;
    line-height: 1.0;
    text-align: center;
  }
  .card .corner .csuit {
    display: block;
    font-size: 18px;
    line-height: 1.0;
    margin-top: 1px;
  }
  .card .big {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-42%, -44%);
    font-size: 62px;
    line-height: 1;
  }
  .card.sm { width: 68px; height: 98px; border-radius: 8px; }
  .card.sm .corner { top: 5px; left: 6px; font-size: 18px; }
  .card.sm .corner .csuit { font-size: 13px; }
  .card.sm .big { font-size: 40px; }
  .card.out { box-shadow: 0 0 0 2px rgba(201,162,39,0.6), 0 6px 14px rgba(0,0,0,0.45); }
  .black { color: #1a1a1a; }
  .red { color: #c0392b; }
  .hand-block {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 22px;
  }
  .hand-label {
    color: #F2EEE3;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.08em;
  }
  .hand-cards { display: flex; gap: 10px; }
  .board-wrap { position: relative; }
  .outs-block {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .gold-note {
    color: #C9A227;
    font-size: 24px;
    font-weight: 800;
    letter-spacing: 0.03em;
    text-align: center;
    white-space: nowrap;
    text-shadow: 0 2px 6px rgba(0,0,0,0.45);
  }
  .wordmark {
    position: absolute;
    right: 44px;
    bottom: 44px;
    color: #C9A227;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.04em;
    opacity: 0.9;
  }
</style>
</head>
<body>
<div id="frame">
  <div class="glow"></div>

  <div class="title">Counting Your <span class="gold">Outs</span></div>

  <div class="hand-block">
    <div class="hand-label">YOUR HAND</div>
    <div class="hand-cards">
      <div class="card sm"><div class="corner red">A<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
      <div class="card sm"><div class="corner red">K<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
    </div>
  </div>

  <div class="board-wrap">
    <div class="label">THE BOARD</div>
    <div class="board-row">
      <div class="card"><div class="corner black">Q<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
      <div class="card"><div class="corner red">J<span class="csuit">&#9830;</span></div><div class="big red">&#9830;</div></div>
      <div class="card"><div class="corner red">9<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
      <div class="card"><div class="corner black">4<span class="csuit">&#9827;</span></div><div class="big black">&#9827;</div></div>
      <div class="card"><div class="corner black">2<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
    </div>
  </div>

  <div class="outs-block">
    <div class="gold-note">Any 10 = the nuts (straight)</div>
    <div class="hand-cards">
      <div class="card sm out"><div class="corner black">10<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
      <div class="card sm out"><div class="corner red">10<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
      <div class="card sm out"><div class="corner red">10<span class="csuit">&#9830;</span></div><div class="big red">&#9830;</div></div>
      <div class="card sm out"><div class="corner black">10<span class="csuit">&#9827;</span></div><div class="big black">&#9827;</div></div>
    </div>
  </div>

  <div class="wordmark">&#9824;HoldemMaster</div>
</div>
</body>
</html>
