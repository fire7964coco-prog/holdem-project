<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flush vs Straight — Hero Infographic</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #0B1F17; }
  .frame {
    position: relative;
    width: 1200px;
    height: 675px;
    overflow: hidden;
    padding: 44px 44px 44px 44px;
    background:
      radial-gradient(ellipse 900px 500px at 50% 38%, rgba(46,125,70,0.28) 0%, rgba(46,125,70,0.0) 65%),
      linear-gradient(160deg, #0B1F17 0%, #13291D 100%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  /* subtle felt vignette */
  .frame::before {
    content: "";
    position: absolute;
    inset: 0;
    box-shadow: inset 0 0 160px rgba(0,0,0,0.55);
    pointer-events: none;
  }
  .title {
    color: #F2EEE3;
    font-size: 46px;
    font-weight: 800;
    letter-spacing: 0.5px;
    text-align: center;
    line-height: 1.1;
    text-shadow: 0 2px 10px rgba(0,0,0,0.45);
  }
  .title .gold { color: #C9A227; }

  .hands {
    margin-top: 30px;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 56px;
  }
  .hand {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .hand-label {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: 4px;
    margin-bottom: 14px;
    text-shadow: 0 1px 6px rgba(0,0,0,0.5);
  }
  .label-flush { color: #C9A227; }
  .label-straight { color: #F2EEE3; }
  .label-straight .sub { color: #7fbf95; }

  .cards {
    display: flex;
  }
  .card {
    width: 100px;
    height: 144px;
    background: linear-gradient(175deg, #FFFFFF 0%, #F2EEE3 100%);
    border-radius: 10px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.45), 0 1px 0 rgba(255,255,255,0.35) inset;
    border: 1px solid rgba(0,0,0,0.18);
    position: relative;
    margin-left: -8px;
  }
  .card:first-child { margin-left: 0; }
  .corner {
    position: absolute;
    top: 7px;
    left: 9px;
    line-height: 1.0;
    text-align: center;
  }
  .corner .rank {
    display: block;
    font-size: 27px;
    font-weight: 800;
  }
  .corner .suit {
    display: block;
    font-size: 20px;
    margin-top: 1px;
  }
  .pip {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -46%);
    font-size: 66px;
    line-height: 1;
  }
  .b { color: #1a1a1a; }
  .r { color: #c0392b; }

  .verdict {
    margin-top: 30px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .badge {
    background: linear-gradient(175deg, #E0BC49 0%, #C9A227 55%, #A88618 100%);
    color: #0B1F17;
    font-size: 30px;
    font-weight: 900;
    letter-spacing: 3px;
    padding: 12px 34px;
    border-radius: 999px;
    box-shadow: 0 6px 20px rgba(201,162,39,0.35), 0 2px 0 rgba(255,255,255,0.35) inset;
    white-space: nowrap;
  }
  .beats {
    color: #F2EEE3;
    font-size: 21px;
    font-weight: 700;
    letter-spacing: 1px;
    white-space: nowrap;
    text-shadow: 0 1px 6px rgba(0,0,0,0.5);
  }
  .beats .spade { color: #C9A227; }
  .beats .arrow { color: #C9A227; font-weight: 900; padding: 0 4px; }
  .beats .loser { color: #d8a08c; }

  .caption {
    margin-top: 22px;
    color: rgba(242,238,227,0.82);
    font-size: 21px;
    font-weight: 500;
    letter-spacing: 0.3px;
    text-align: center;
    text-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }
  .caption .gold { color: #C9A227; font-weight: 700; }

  .wordmark {
    position: absolute;
    right: 44px;
    bottom: 44px;
    color: #C9A227;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 1px;
    opacity: 0.92;
  }
</style>
</head>
<body>
<div class="frame">

  <div class="title">Does a <span class="gold">Flush</span> Beat a Straight?</div>

  <div class="hands">
    <!-- LEFT: FLUSH — A♠ J♠ 9♠ 6♠ 2♠ (all spades, black) -->
    <div class="hand">
      <div class="hand-label label-flush">FLUSH</div>
      <div class="cards">
        <div class="card">
          <div class="corner b"><span class="rank">A</span><span class="suit">&#9824;</span></div>
          <div class="pip b">&#9824;</div>
        </div>
        <div class="card">
          <div class="corner b"><span class="rank">J</span><span class="suit">&#9824;</span></div>
          <div class="pip b">&#9824;</div>
        </div>
        <div class="card">
          <div class="corner b"><span class="rank">9</span><span class="suit">&#9824;</span></div>
          <div class="pip b">&#9824;</div>
        </div>
        <div class="card">
          <div class="corner b"><span class="rank">6</span><span class="suit">&#9824;</span></div>
          <div class="pip b">&#9824;</div>
        </div>
        <div class="card">
          <div class="corner b"><span class="rank">2</span><span class="suit">&#9824;</span></div>
          <div class="pip b">&#9824;</div>
        </div>
      </div>
    </div>

    <!-- RIGHT: STRAIGHT — 9♠ 8♥ 7♦ 6♣ 5♠ (consecutive, mixed suits) -->
    <div class="hand">
      <div class="hand-label label-straight">STRAIGHT</div>
      <div class="cards">
        <div class="card">
          <div class="corner b"><span class="rank">9</span><span class="suit">&#9824;</span></div>
          <div class="pip b">&#9824;</div>
        </div>
        <div class="card">
          <div class="corner r"><span class="rank">8</span><span class="suit">&#9829;</span></div>
          <div class="pip r">&#9829;</div>
        </div>
        <div class="card">
          <div class="corner r"><span class="rank">7</span><span class="suit">&#9830;</span></div>
          <div class="pip r">&#9830;</div>
        </div>
        <div class="card">
          <div class="corner b"><span class="rank">6</span><span class="suit">&#9827;</span></div>
          <div class="pip b">&#9827;</div>
        </div>
        <div class="card">
          <div class="corner b"><span class="rank">5</span><span class="suit">&#9824;</span></div>
          <div class="pip b">&#9824;</div>
        </div>
      </div>
    </div>
  </div>

  <div class="verdict">
    <div class="badge">FLUSH WINS</div>
    <div class="beats"><span class="spade">&#9824;</span> Flush <span class="arrow">&#10142;</span> beats <span class="arrow">&#10142;</span> <span class="loser">Straight</span></div>
  </div>

  <div class="caption">A flush is <span class="gold">rarer</span> than a straight — so it always wins.</div>

  <div class="wordmark">&#9824;HoldemMaster</div>

</div>
</body>
</html>
