<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:#F5F0E4; }
.stage {
  position:relative; width:1200px; height:675px; overflow:hidden; padding:38px 48px 44px;
  background:
    radial-gradient(ellipse 800px 420px at 50% -12%, rgba(201,162,39,0.14), rgba(201,162,39,0) 65%),
    linear-gradient(165deg,#F7F2E7 0%,#F1EBDB 100%);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic",Roboto,Helvetica,Arial,sans-serif;
  display:flex; flex-direction:column;
}
.top { display:flex; align-items:center; justify-content:center; gap:20px; }
.minicards { display:flex; gap:8px; }
.card { position:relative; width:58px; height:84px; background:linear-gradient(175deg,#FDFBF4 0%,#F2EEE3 100%);
  border:1px solid #d9d0b8; border-radius:7px; box-shadow:0 4px 10px rgba(60,50,20,.22); }
.card .corner { position:absolute; top:5px; left:6px; font-size:16px; font-weight:800; line-height:1; text-align:center; }
.card .corner .csuit { display:block; font-size:11px; line-height:1; margin-top:1px; }
.card .big { position:absolute; top:50%; left:50%; transform:translate(-42%,-44%); font-size:36px; line-height:1; }
.black { color:#1a1a1a; } .red { color:#c0392b; }
h1 { color:#26311f; font-size:44px; font-weight:800; text-align:center; }
h1 .gold { color:#A8861B; }
.rule { width:420px; height:3px; margin:12px auto 0; border-radius:2px;
  background:linear-gradient(90deg,rgba(201,162,39,0) 0%,#C9A227 50%,rgba(201,162,39,0) 100%); }
.grid { flex:1; display:grid; grid-template-columns:1fr 1fr 1fr; grid-auto-rows:1fr; gap:20px; margin-top:22px; }
.node { background:#FBF8EF; border:2px solid rgba(201,162,39,.5); border-radius:16px;
  padding:20px 18px 18px; display:flex; flex-direction:column; gap:10px;
  box-shadow:0 6px 16px rgba(60,50,20,.10); }
.qrow { display:flex; align-items:center; gap:10px; }
.qbadge { width:38px; height:38px; border-radius:50%; background:#C9A227; color:#26311f;
  font-size:17px; font-weight:900; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.q { color:#26311f; font-size:20px; font-weight:800; line-height:1.25; }
.a { color:#2E7D46; font-size:19px; font-weight:800; padding-left:48px; }
.a .gold { color:#A8861B; }
.node.tip { background:#26311f; border-color:rgba(201,162,39,.7); align-items:center; justify-content:center; }
.node.tip .tiptext { color:#F5F0E4; font-size:20px; font-weight:800; text-align:center; line-height:1.4; }
.node.tip .tiptext .gold { color:#C9A227; }
.wordmark { position:absolute; right:44px; bottom:20px; color:#A8861B; font-size:15px; font-weight:800; letter-spacing:.04em; }
</style>
</head>
<body>
<div class="stage">
  <div class="top">
    <div class="minicards">
      <div class="card"><div class="corner black">A<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
      <div class="card"><div class="corner red">K<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
    </div>
    <h1>AK <span class="gold">FAQ</span></h1>
  </div>
  <div class="rule"></div>
  <div class="grid">
    <div class="node">
      <div class="qrow"><div class="qbadge">Q1</div><div class="q">수티드와 차이는?</div></div>
      <div class="a">승률 <span class="gold">약 3%</span> 차이, 전략은 동일</div>
    </div>
    <div class="node">
      <div class="qrow"><div class="qbadge">Q2</div><div class="q">상대 AA를 예측하려면?</div></div>
      <div class="a"><span class="gold">4벳</span> 패턴을 관찰</div>
    </div>
    <div class="node">
      <div class="qrow"><div class="qbadge">Q3</div><div class="q">프리플랍 올인은 언제?</div></div>
      <div class="a">스택 <span class="gold">20BB 이하</span>일 때</div>
    </div>
    <div class="node">
      <div class="qrow"><div class="qbadge">Q4</div><div class="q">미스 후 C벳 사이즈는?</div></div>
      <div class="a">팟의 <span class="gold">33~50%</span></div>
    </div>
    <div class="node">
      <div class="qrow"><div class="qbadge">Q5</div><div class="q">스타팅 핸드 순위는?</div></div>
      <div class="a">전체 <span class="gold">6위</span></div>
    </div>
    <div class="node tip">
      <div class="tiptext">AK는 페어가 아니다<br><span class="gold">공격적으로, 그러나 유연하게</span></div>
    </div>
  </div>
  <div class="wordmark">&#9824;HoldemMaster</div>
</div>
</body>
</html>
