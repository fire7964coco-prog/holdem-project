<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:#0B1F17; }
.stage {
  position:relative; width:1200px; height:675px; overflow:hidden; padding:44px;
  background:
    radial-gradient(ellipse 900px 500px at 50% -10%, rgba(46,125,70,0.26), rgba(46,125,70,0) 65%),
    linear-gradient(160deg,#0B1F17 0%,#13291D 100%);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  display:flex; flex-direction:column; align-items:center;
}
h1 { color:#F2EEE3; font-size:42px; font-weight:800; text-align:center; text-shadow:0 2px 12px rgba(0,0,0,.45); }
h1 .gold { color:#C9A227; }
.wordmark { position:absolute; right:44px; bottom:44px; color:#C9A227; font-size:15px; font-weight:800; letter-spacing:.04em; opacity:.9; }

.panels { display:flex; gap:24px; margin-top:30px; width:100%; flex:1; }
.panel { flex:1; background:rgba(0,0,0,.28); border:2px solid rgba(192,57,43,.5); border-radius:16px; padding:22px 16px 20px; display:flex; flex-direction:column; align-items:center; gap:14px; }
.badge { width:46px; height:46px; border-radius:50%; background:#C9A227; color:#0B1F17; font-weight:900; font-size:26px; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 10px rgba(0,0,0,.4); }
.pt { color:#F2EEE3; font-size:27px; font-weight:800; }
.viz { height:120px; display:flex; align-items:center; justify-content:center; gap:8px; }
.sub { color:rgba(242,238,227,.72); font-size:17px; font-weight:600; text-align:center; }
.x { width:54px; height:54px; border-radius:50%; border:3px solid #c0392b; color:#c0392b; font-size:30px; font-weight:900; display:flex; align-items:center; justify-content:center; background:rgba(192,57,43,.12); }

.card { position:relative; width:64px; height:92px; background:linear-gradient(175deg,#FDFBF4 0%,#F2EEE3 100%); border-radius:8px; box-shadow:0 6px 14px rgba(0,0,0,.45); }
.card .corner { position:absolute; top:5px; left:6px; font-size:18px; font-weight:800; line-height:1; text-align:center; }
.card .corner .csuit { display:block; font-size:12px; line-height:1; margin-top:1px; }
.card .big { position:absolute; top:50%; left:50%; transform:translate(-42%,-44%); font-size:40px; line-height:1; }
.card.back { background:repeating-linear-gradient(45deg,#7a1420 0 10px,#5c0f18 10px 20px); border:3px solid #F2EEE3; }
.black { color:#1a1a1a; } .red { color:#c0392b; }

.chip { width:58px; height:58px; border-radius:50%; background:radial-gradient(circle at 50% 42%,#3a3a3a 0 52%,#1a1a1a 53%); border:5px dashed #C9A227; }
</style></head>
<body>
<div class="stage">
  <h1>블러핑 금지 상황 <span class="gold">3가지</span></h1>
  <div class="panels">
    <div class="panel">
      <div class="badge">1</div>
      <div class="pt">멀티팟</div>
      <div class="viz">
        <div class="card back"></div>
        <div class="card back"></div>
        <div class="card back"></div>
      </div>
      <div class="x">&#10005;</div>
      <div class="sub">상대가 많을수록<br>블러핑은 실패한다</div>
    </div>
    <div class="panel">
      <div class="badge">2</div>
      <div class="pt">콜링 스테이션</div>
      <div class="viz">
        <div class="chip"></div>
        <div class="chip"></div>
        <div class="chip"></div>
      </div>
      <div class="x">&#10005;</div>
      <div class="sub">어차피 콜한다<br>폴드를 모르는 상대</div>
    </div>
    <div class="panel">
      <div class="badge">3</div>
      <div class="pt">웻보드</div>
      <div class="viz">
        <div class="card"><div class="corner black">9<span class="csuit">&#9827;</span></div><div class="big black">&#9827;</div></div>
        <div class="card"><div class="corner black">8<span class="csuit">&#9827;</span></div><div class="big black">&#9827;</div></div>
        <div class="card"><div class="corner black">7<span class="csuit">&#9827;</span></div><div class="big black">&#9827;</div></div>
      </div>
      <div class="x">&#10005;</div>
      <div class="sub">드로우가 가득해<br>콜 받을 핸드가 많다</div>
    </div>
  </div>
  <div class="wordmark">&#9824;HoldemMaster</div>
</div>
</body></html>
