<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:#0B1F17; }
.stage {
  position:relative; width:1200px; height:675px; overflow:hidden;
  background:
    radial-gradient(ellipse 900px 500px at 50% -10%, rgba(46,125,70,0.26), rgba(46,125,70,0) 65%),
    linear-gradient(160deg,#0B1F17 0%,#13291D 100%);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
.hdr { position:absolute; top:34px; left:0; width:100%; text-align:center; }
.hdr h1 { color:#F2EEE3; font-size:34px; font-weight:800; text-shadow:0 2px 12px rgba(0,0,0,.45); }
.hdr h1 .gold { color:#C9A227; }
.hdr .sub { color:#C9A227; font-size:14px; font-weight:700; margin-top:6px; }
.card { position:absolute; width:96px; height:138px; background:linear-gradient(175deg,#FDFBF4 0%,#F2EEE3 100%); border-radius:10px; box-shadow:0 6px 14px rgba(0,0,0,.45),0 1px 3px rgba(0,0,0,.3); }
.card .corner { position:absolute; top:7px; left:9px; font-size:25px; font-weight:800; line-height:1; text-align:center; }
.card .corner .csuit { display:block; font-size:17px; line-height:1; margin-top:1px; }
.card .big { position:absolute; top:50%; left:50%; transform:translate(-42%,-44%); font-size:60px; line-height:1; }
.card.back { background:repeating-linear-gradient(45deg,#7a1420 0 10px,#5c0f18 10px 20px); border:3px solid #F2EEE3; }
.card.out { box-shadow:0 0 34px rgba(201,162,39,.55), 0 6px 14px rgba(0,0,0,.45); }
.black { color:#1a1a1a; } .red { color:#c0392b; }
.deck { position:absolute; left:96px; top:280px; width:260px; height:220px; }
.deck .card { left:0; top:30px; transform-origin:50% 120%; }
.dlabel { position:absolute; left:96px; top:530px; width:260px; text-align:center; color:#F2EEE3; font-size:14px; font-weight:700; opacity:.85; }
.next { position:absolute; left:452px; top:296px; }
.nlabel { position:absolute; left:414px; top:452px; width:170px; text-align:center; color:#F2EEE3; font-size:14px; font-weight:700; opacity:.85; }
.arrow { position:absolute; left:576px; top:352px; color:#C9A227; font-size:34px; font-weight:900; }
.outs { position:absolute; left:648px; top:296px; display:flex; gap:20px; }
.outwrap { position:relative; width:96px; }
.outtag {
  margin-top:12px; width:52px; margin-left:22px;
  background:#C9A227; color:#0B1F17; font-size:12px; font-weight:900; text-align:center;
  padding:3px 0; border-radius:999px; letter-spacing:.08em;
}
.olabel { position:absolute; left:648px; top:500px; width:444px; text-align:center; color:#C9A227; font-size:15px; font-weight:800; }
.wordmark { position:absolute; right:44px; bottom:40px; color:#C9A227; font-size:15px; font-weight:800; letter-spacing:.04em; opacity:.9; }
</style>
</head>
<body>
<div class="stage">
  <div class="hdr">
    <h1>아웃츠 &#8212; 남은 덱 속의 <span class="gold">승리 카드</span></h1>
    <div class="sub">보이지 않는 카드 중에서 내 핸드를 완성해 주는 카드를 센다</div>
  </div>

  <div class="deck">
    <div class="card back" style="transform:rotate(-18deg);"></div>
    <div class="card back" style="transform:rotate(-9deg);"></div>
    <div class="card back" style="transform:rotate(0deg);"></div>
    <div class="card back" style="transform:rotate(9deg);"></div>
    <div class="card back" style="transform:rotate(18deg);"></div>
  </div>
  <div class="dlabel">남은 덱</div>

  <div class="card back next"></div>
  <div class="nlabel">다음 카드</div>

  <div class="arrow">&#8594;</div>

  <div class="outs">
    <div class="outwrap">
      <div class="card out" style="position:relative;"><div class="corner red">A<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
      <div class="outtag">OUT</div>
    </div>
    <div class="outwrap">
      <div class="card out" style="position:relative;"><div class="corner black">K<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
      <div class="outtag">OUT</div>
    </div>
    <div class="outwrap">
      <div class="card out" style="position:relative;"><div class="corner red">K<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
      <div class="outtag">OUT</div>
    </div>
    <div class="outwrap">
      <div class="card out" style="position:relative;"><div class="corner red">K<span class="csuit">&#9830;</span></div><div class="big red">&#9830;</div></div>
      <div class="outtag">OUT</div>
    </div>
  </div>
  <div class="olabel">이 4장이 나오면 승리 &#8212; 아웃츠 4장</div>

  <div class="wordmark">&#9824;HoldemMaster</div>
</div>
</body>
</html>
