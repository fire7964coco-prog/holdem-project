<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:#0B1F17; }
.stage {
  position:relative; width:1200px; height:675px; overflow:hidden; padding:44px;
  background:
    radial-gradient(ellipse 900px 500px at 50% -10%, rgba(46,125,70,0.26), rgba(46,125,70,0) 65%),
    linear-gradient(160deg,#0B1F17 0%,#13291D 100%);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  display:flex; flex-direction:column; align-items:center;
}
.kicker { color:#C9A227; font-size:15px; font-weight:700; letter-spacing:.22em; text-align:center; margin-bottom:8px; }
h1 { color:#F2EEE3; font-size:46px; font-weight:800; text-align:center; text-shadow:0 2px 12px rgba(0,0,0,.45); }
h1 .gold { color:#C9A227; }
.wordmark { position:absolute; right:44px; bottom:44px; color:#C9A227; font-size:15px; font-weight:800; letter-spacing:.04em; opacity:.9; }

.grid { display:grid; grid-template-columns:1fr 1fr; gap:26px 30px; margin-top:34px; width:1080px; }
.qcard {
  display:flex; align-items:center; gap:20px; padding:28px 28px;
  background:rgba(0,0,0,.28); border:2px solid rgba(201,162,39,.55); border-radius:16px;
}
.qbadge { width:60px; height:60px; border-radius:50%; background:#C9A227; color:#0B1F17;
  font-weight:900; font-size:30px; display:flex; align-items:center; justify-content:center; flex:none;
  box-shadow:0 3px 8px rgba(0,0,0,.4); }
.qtext { color:#F2EEE3; font-size:27px; font-weight:800; flex:1; line-height:1.3; letter-spacing:-.01em; }
.achip { flex:none; padding:12px 24px; border-radius:999px;
  background:rgba(201,162,39,.16); border:2px solid #C9A227;
  color:#C9A227; font-size:26px; font-weight:900; white-space:nowrap; }
</style>
</head>
<body>
<div class="stage">
  <div class="kicker">자주 묻는 질문</div>
  <h1>홀덤펍 <span class="gold">FAQ</span></h1>

  <div class="grid">
    <div class="qcard">
      <div class="qbadge">Q1</div>
      <div class="qtext">룰 몰라도<br>입장 가능?</div>
      <div class="achip">가능</div>
    </div>
    <div class="qcard">
      <div class="qbadge">Q2</div>
      <div class="qtext">혼자 가도<br>괜찮을까?</div>
      <div class="achip">환영</div>
    </div>
    <div class="qcard">
      <div class="qbadge">Q3</div>
      <div class="qtext">드레스코드<br>있을까?</div>
      <div class="achip">없음</div>
    </div>
    <div class="qcard">
      <div class="qbadge">Q4</div>
      <div class="qtext">예산은 얼마면<br>될까?</div>
      <div class="achip">4~6만원</div>
    </div>
  </div>

  <div class="wordmark">&#9824;HoldemMaster</div>
</div>
</body>
</html>
