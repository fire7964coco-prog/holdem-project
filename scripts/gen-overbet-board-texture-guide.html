<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:#0B1F17; }
.stage {
  position:relative; width:1200px; height:675px; overflow:hidden; padding:44px;
  background:
    radial-gradient(ellipse 900px 500px at 50% -10%, rgba(46,125,70,0.26), rgba(46,125,70,0) 65%),
    linear-gradient(160deg,#0B1F17 0%,#13291D 100%);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  display:flex; flex-direction:column; align-items:center;
}
.kicker { color:#C9A227; font-size:15px; font-weight:700; letter-spacing:.28em; text-transform:uppercase; text-align:center; margin-bottom:8px; }
h1 { color:#F2EEE3; font-size:44px; font-weight:800; text-align:center; text-shadow:0 2px 12px rgba(0,0,0,.45); }
h1 .gold { color:#C9A227; }
.wordmark { position:absolute; right:44px; bottom:44px; color:#C9A227; font-size:15px; font-weight:800; letter-spacing:.04em; opacity:.9; }

.row { display:flex; justify-content:center; gap:40px; margin-top:36px; }
.panel { width:480px; background:rgba(0,0,0,.28); border-radius:16px; padding:28px 30px 34px; display:flex; flex-direction:column; align-items:center; }
.panel.dry { border:3px solid #3f9a5e; }
.panel.wet { border:3px solid #c0392b; }
.ptitle { font-size:28px; font-weight:900; letter-spacing:.06em; margin-bottom:6px; }
.panel.dry .ptitle { color:#5fca85; }
.panel.wet .ptitle { color:#e05c4b; }
.psub { font-size:19px; font-weight:700; margin-bottom:24px; }
.panel.dry .psub { color:#F2EEE3; }
.panel.wet .psub { color:#F2EEE3; }
.cards { display:flex; gap:16px; }

.card { position:relative; width:110px; height:158px; background:linear-gradient(175deg,#FDFBF4 0%,#F2EEE3 100%); border-radius:10px; box-shadow:0 6px 14px rgba(0,0,0,.45),0 1px 3px rgba(0,0,0,.3); }
.card .corner { position:absolute; top:8px; left:10px; font-size:28px; font-weight:800; line-height:1; text-align:center; }
.card .corner .csuit { display:block; font-size:19px; line-height:1; margin-top:1px; }
.card .big { position:absolute; top:50%; left:50%; transform:translate(-42%,-44%); font-size:70px; line-height:1; }
.black { color:#1a1a1a; } .red { color:#c0392b; }
</style>
</head>
<body>
<div class="stage">
  <div class="kicker">Board Texture</div>
  <h1>WHEN TO <span class="gold">OVERBET</span></h1>
  <div class="row">
    <div class="panel dry">
      <div class="ptitle">DRY BOARD</div>
      <div class="psub">Overbet OK</div>
      <div class="cards">
        <div class="card"><div class="corner red">A<span class="csuit">&#9830;</span></div><div class="big red">&#9830;</div></div>
        <div class="card"><div class="corner black">7<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
        <div class="card"><div class="corner red">2<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
      </div>
    </div>
    <div class="panel wet">
      <div class="ptitle">WET BOARD</div>
      <div class="psub">Avoid Overbet</div>
      <div class="cards">
        <div class="card"><div class="corner black">9<span class="csuit">&#9827;</span></div><div class="big black">&#9827;</div></div>
        <div class="card"><div class="corner black">8<span class="csuit">&#9827;</span></div><div class="big black">&#9827;</div></div>
        <div class="card"><div class="corner black">7<span class="csuit">&#9827;</span></div><div class="big black">&#9827;</div></div>
      </div>
    </div>
  </div>
  <div class="wordmark">&#9824;HoldemMaster</div>
</div>
</body>
</html>
