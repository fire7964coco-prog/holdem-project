<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 675px; }
  .frame {
    position: relative;
    width: 1200px;
    height: 675px;
    overflow: hidden;
    background: linear-gradient(135deg, #0B1F17 0%, #13291D 52%, #0B1F17 100%);
    font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    color: #F2EEE3;
    padding: 46px 56px 44px;
    display: flex;
    flex-direction: column;
  }
  .frame::before {
    content: "";
    position: absolute;
    left: 50%; top: 46%;
    width: 940px; height: 560px;
    transform: translate(-50%, -50%);
    background: radial-gradient(ellipse at center, rgba(46,125,70,0.14) 0%, rgba(46,125,70,0) 70%);
    pointer-events: none;
  }
  .title {
    position: relative;
    text-align: center;
    font-size: 38px;
    font-weight: 800;
    line-height: 1.15;
    margin-bottom: 30px;
  }
  .title .gold { color: #C9A227; }
  .main {
    position: relative;
    flex: 1;
    display: flex;
    gap: 40px;
  }
  .panel {
    flex: 1;
    border-radius: 18px;
    background: rgba(242,238,227,0.045);
    padding: 26px 28px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 0;
  }
  .panel.cash { border: 2px solid rgba(46,125,70,0.65); }
  .panel.tour { border: 2px solid rgba(180,70,46,0.65); }
  .panel-label {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 0.12em;
    margin-bottom: 20px;
    white-space: nowrap;
  }
  .panel.cash .panel-label { color: #7FC28F; }
  .panel.tour .panel-label { color: #E08A6F; }
  /* chip stack: side-view chip edges + round top face */
  .stack {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 22px;
  }
  .chip-top {
    width: 118px; height: 118px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 44px;
    font-weight: 800;
    margin-bottom: 12px;
    z-index: 2;
  }
  .cash .chip-top {
    background: radial-gradient(circle at 34% 30%, #2E7D46 0%, #1D5731 70%);
    border: 6px dashed #7FC28F;
    color: #EAF6EC;
  }
  .tour .chip-top {
    background: radial-gradient(circle at 34% 30%, #C9A227 0%, #8F721B 70%);
    border: 6px dashed #F0DA9A;
    color: #0B1F17;
  }
  .edge {
    width: 150px; height: 24px;
    border-radius: 12px;
    margin-top: -6px;
    border: 1px solid rgba(0,0,0,0.35);
  }
  .cash .edge {
    background: repeating-linear-gradient(90deg, #2E7D46 0 24px, #EAF6EC 24px 36px);
  }
  .tour .edge {
    background: repeating-linear-gradient(90deg, #C9A227 0 24px, #3A2F12 24px 36px);
  }
  .verdict {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
  }
  .mark {
    flex: 0 0 auto;
    width: 52px; height: 52px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    font-weight: 900;
  }
  .mark.ok { background: rgba(46,125,70,0.25); border: 2px solid #2E7D46; color: #7FC28F; }
  .mark.no { background: rgba(180,70,46,0.22); border: 2px solid #B4462E; color: #E08A6F; }
  .verdict-text {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.3;
  }
  .verdict-text .green { color: #7FC28F; }
  .verdict-text .red { color: #E08A6F; }
  .sub {
    font-size: 18px;
    font-weight: 500;
    color: rgba(242,238,227,0.78);
    text-align: center;
    line-height: 1.4;
  }
  .footer {
    position: relative;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    margin-top: 20px;
  }
  .wordmark {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: #C9A227;
    opacity: 0.9;
  }
  .wordmark .suit { color: #2E7D46; margin-right: 6px; }
</style>
</head>
<body>
  <div class="frame">
    <div class="title">Tournament Chips <span class="gold">Aren't Money</span></div>
    <div class="main">
      <div class="panel cash">
        <div class="panel-label">CASH GAME CHIPS</div>
        <div class="stack">
          <div class="chip-top">$</div>
          <div class="edge"></div>
          <div class="edge"></div>
          <div class="edge"></div>
        </div>
        <div class="verdict">
          <div class="mark ok">✓</div>
          <div class="verdict-text"><span class="green">Cash out anytime</span></div>
        </div>
        <div class="sub">Every chip = real $ in your pocket</div>
      </div>
      <div class="panel tour">
        <div class="panel-label">TOURNAMENT CHIPS</div>
        <div class="stack">
          <div class="chip-top">🔒</div>
          <div class="edge"></div>
          <div class="edge"></div>
          <div class="edge"></div>
        </div>
        <div class="verdict">
          <div class="mark no">✗</div>
          <div class="verdict-text"><span class="red">No cash-out mid-event</span></div>
        </div>
        <div class="sub">Only a finishing place pays</div>
      </div>
    </div>
    <div class="footer">
      <div class="wordmark"><span class="suit">♠</span>HoldemMaster</div>
    </div>
  </div>
</body>
</html>
