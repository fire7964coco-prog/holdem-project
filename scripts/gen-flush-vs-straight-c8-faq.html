<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:#0B1F17; }
.stage {
  position:relative; width:1200px; height:675px; overflow:hidden; padding:40px 48px 44px;
  border:10px solid #1E4A2E;
  background:
    radial-gradient(ellipse 900px 500px at 50% -10%, rgba(46,125,70,0.26), rgba(46,125,70,0) 65%),
    linear-gradient(160deg,#0B1F17 0%,#13291D 100%);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  display:flex; flex-direction:column; align-items:center; gap:20px;
}
h1 { color:#F2EEE3; font-size:46px; font-weight:800; text-align:center; text-shadow:0 2px 12px rgba(0,0,0,.45); }
h1 .gold { color:#C9A227; }
.wordmark { position:absolute; right:40px; bottom:26px; color:#C9A227; font-size:15px; font-weight:800; letter-spacing:.04em; opacity:.9; }

.faq { display:flex; flex-direction:column; gap:18px; width:1000px; }
.qa {
  display:flex; align-items:center; gap:22px;
  background:rgba(0,0,0,.28); border:2px solid rgba(201,162,39,.55); border-radius:16px; padding:18px 28px;
}
.qtext { color:#F2EEE3; font-size:30px; font-weight:800; }
.qtext .qdot { color:#C9A227; }
.arrow { flex-shrink:0; width:0; height:0; border-top:12px solid transparent; border-bottom:12px solid transparent; border-left:16px solid #C9A227; margin-left:auto; }
.ans { flex-shrink:0; background:#C9A227; color:#0B1F17; font-size:26px; font-weight:900; padding:8px 24px; border-radius:999px; }
.cards { display:flex; gap:8px; flex-shrink:0; margin-left:14px; }

.card { position:relative; width:66px; height:95px; background:linear-gradient(175deg,#FDFBF4 0%,#F2EEE3 100%); border-radius:8px; box-shadow:0 5px 12px rgba(0,0,0,.45),0 1px 3px rgba(0,0,0,.3); }
.card .corner { position:absolute; top:5px; left:7px; font-size:17px; font-weight:800; line-height:1; text-align:center; }
.card .corner .csuit { display:block; font-size:11px; line-height:1; margin-top:1px; }
.card .big { position:absolute; top:50%; left:50%; transform:translate(-42%,-44%); font-size:38px; line-height:1; }
.red { color:#c0392b; } .black { color:#1a1a1a; }
</style>
</head>
<body>
<div class="stage">
  <h1>플러시 <span class="gold">FAQ</span></h1>
  <div class="faq">
    <div class="qa">
      <div class="qtext"><span class="qdot">Q.</span>플러시 vs 스트레이트?</div>
      <div class="arrow"></div>
      <div class="ans">플러시 승</div>
      <div class="cards">
        <div class="card"><div class="corner red">A<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
        <div class="card"><div class="corner red">K<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
      </div>
    </div>
    <div class="qa">
      <div class="qtext"><span class="qdot">Q.</span>같은 플러시면?</div>
      <div class="arrow"></div>
      <div class="ans">높은 카드 비교</div>
    </div>
    <div class="qa">
      <div class="qtext"><span class="qdot">Q.</span>무늬 서열?</div>
      <div class="arrow"></div>
      <div class="ans">없음</div>
    </div>
  </div>
  <div class="wordmark">&#9824;HoldemMaster</div>
</div>
</body>
</html>
