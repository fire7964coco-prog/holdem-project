<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:#0B1F17; }
.stage {
  position:relative; width:1200px; height:675px; overflow:hidden; padding:44px;
  background:
    radial-gradient(ellipse 900px 500px at 50% -10%, rgba(46,125,70,0.26), rgba(46,125,70,0) 65%),
    linear-gradient(160deg,#0B1F17 0%,#13291D 100%);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
.tag {
  position:absolute; left:50%; top:48px; transform:translateX(-50%);
  background:#C9A227; color:#0B1F17; font-weight:900; font-size:28px; letter-spacing:.14em;
  padding:8px 30px; border-radius:14px; box-shadow:0 4px 12px rgba(0,0,0,.45);
}
.table {
  position:absolute; left:50%; top:54%; transform:translate(-50%,-50%);
  width:780px; height:410px; border-radius:50%;
  background:radial-gradient(ellipse at 50% 40%, #1f5f39, #123B24 72%);
  border:12px solid #C9A227;
  box-shadow:0 18px 40px rgba(0,0,0,.55), inset 0 0 60px rgba(0,0,0,.35);
}
/* range fans: cones from seat toward table center */
.fan { position:absolute; transform-origin:0 50%; opacity:.75; }
.fan.gold {
  left:850px; top:475px; width:330px; height:300px;
  transform:translate(0,-50%) rotate(207deg);
  background:conic-gradient(from 245deg at 0% 50%, rgba(201,162,39,0) 0deg, rgba(201,162,39,.85) 20deg, rgba(230,196,86,.9) 57deg, rgba(201,162,39,.85) 95deg, rgba(201,162,39,0) 115deg);
  clip-path:polygon(0 50%, 100% 0, 100% 100%);
}
.fan.red {
  left:355px; top:225px; width:300px; height:110px;
  transform:translate(0,-50%) rotate(28deg);
  background:conic-gradient(from 335deg at 0% 50%, rgba(192,57,43,0) 0deg, rgba(192,57,43,.9) 12deg, rgba(224,92,77,.9) 25deg, rgba(192,57,43,.9) 38deg, rgba(192,57,43,0) 50deg);
  clip-path:polygon(0 50%, 100% 0, 100% 100%);
}
.seat {
  position:absolute; width:96px; height:52px; border-radius:26px;
  background:#0B1F17; border:3px solid rgba(201,162,39,.8);
  color:#F2EEE3; font-size:24px; font-weight:900;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 6px 14px rgba(0,0,0,.5); z-index:5;
}
.seat.hot { background:#C9A227; color:#0B1F17; }
.seat.cold { border-color:#c0392b; }
.flabel { position:absolute; font-size:26px; font-weight:900; letter-spacing:.1em; z-index:6; }
.flabel.gold { color:#e6c456; }
.flabel.red { color:#e05c4d; }
/* chips */
.stack { position:absolute; display:flex; flex-direction:column-reverse; align-items:center; z-index:6; }
.chip {
  width:52px; height:12px; border-radius:6px; margin-top:-4px;
  background:linear-gradient(180deg,#e0bb4a,#96781e); border:2px solid #F2EEE3;
  box-shadow:0 2px 4px rgba(0,0,0,.4);
}
.chip.dark { background:linear-gradient(180deg,#3d5c48,#1d3527); }
.wordmark { position:absolute; right:44px; bottom:44px; color:#C9A227; font-size:15px; font-weight:800; letter-spacing:.04em; opacity:.9; }
</style>
</head>
<body>
<div class="stage">
  <div class="tag">3-BET</div>
  <div class="table"></div>
  <div class="fan gold"></div>
  <div class="fan red"></div>
  <div class="seat cold" style="left:300px; top:196px;">UTG</div>
  <div class="seat" style="left:790px; top:196px;">CO</div>
  <div class="seat hot" style="left:812px; top:452px;">BTN</div>
  <div class="seat" style="left:552px; top:518px;">SB</div>
  <div class="seat" style="left:300px; top:452px;">BB</div>
  <div class="flabel gold" style="left:625px; top:378px;">WIDE</div>
  <div class="flabel red" style="left:470px; top:262px;">NARROW</div>
  <div class="stack" style="left:836px; top:390px;">
    <div class="chip"></div><div class="chip dark"></div><div class="chip"></div><div class="chip dark"></div>
  </div>
  <div class="stack" style="left:326px; top:396px;">
    <div class="chip dark"></div><div class="chip"></div><div class="chip dark"></div>
  </div>
  <div class="wordmark">&#9824;HoldemMaster</div>
</div>
</body>
</html>
