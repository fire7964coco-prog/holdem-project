<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:#0B1F17; }
.stage {
  position:relative; width:1200px; height:675px; overflow:hidden; padding:44px;
  background:
    radial-gradient(ellipse 900px 500px at 50% -10%, rgba(46,125,70,0.26), rgba(46,125,70,0) 65%),
    linear-gradient(160deg,#0B1F17 0%,#13291D 100%);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  display:flex; flex-direction:column; align-items:center;
}
.kicker { color:#C9A227; font-size:15px; font-weight:700; letter-spacing:.28em; text-transform:uppercase; text-align:center; margin-bottom:8px; }
h1 { color:#F2EEE3; font-size:44px; font-weight:800; text-align:center; text-shadow:0 2px 12px rgba(0,0,0,.45); }
h1 .gold { color:#C9A227; }
.wordmark { position:absolute; right:44px; bottom:44px; color:#C9A227; font-size:15px; font-weight:800; letter-spacing:.04em; opacity:.9; }

.row { display:flex; align-items:flex-start; justify-content:center; gap:34px; margin-top:34px; }
.panel { background:rgba(0,0,0,.28); border:2px solid rgba(201,162,39,.55); border-radius:16px; padding:22px 26px; display:flex; flex-direction:column; align-items:center; }
.plabel { color:#C9A227; font-size:16px; font-weight:800; letter-spacing:.14em; text-transform:uppercase; margin-bottom:14px; }
.cards { display:flex; gap:12px; }

.card { position:relative; width:96px; height:138px; background:linear-gradient(175deg,#FDFBF4 0%,#F2EEE3 100%); border-radius:10px; box-shadow:0 6px 14px rgba(0,0,0,.45),0 1px 3px rgba(0,0,0,.3); }
.card .corner { position:absolute; top:7px; left:9px; font-size:25px; font-weight:800; line-height:1; text-align:center; }
.card .corner .csuit { display:block; font-size:17px; line-height:1; margin-top:1px; }
.card .big { position:absolute; top:50%; left:50%; transform:translate(-42%,-44%); font-size:60px; line-height:1; }
.card.back { background:repeating-linear-gradient(45deg,#7a1420 0 10px,#5c0f18 10px 20px); border:3px solid #F2EEE3; }
.black { color:#1a1a1a; } .red { color:#c0392b; }

.card.sm { width:78px; height:112px; border-radius:8px; }
.card.sm .corner { top:6px; left:7px; font-size:20px; }
.card.sm .corner .csuit { font-size:13px; }
.card.sm .big { font-size:46px; }

.pot { display:flex; align-items:center; gap:16px; margin-top:20px; }
.chips { position:relative; width:100px; height:56px; }
.chip { position:absolute; width:52px; height:52px; border-radius:50%; background:#C9A227; border:6px dashed rgba(242,238,227,.85); box-shadow:0 3px 8px rgba(0,0,0,.45); }
.chip.c1 { left:0; top:2px; }
.chip.c2 { left:26px; top:0; background:#2E7D46; }
.chip.c3 { left:50px; top:3px; background:#7a1420; }
.bet { color:#0B1F17; background:#C9A227; font-size:22px; font-weight:900; letter-spacing:.05em; padding:10px 20px; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,.4); }
</style>
</head>
<body>
<div class="stage">
  <div class="kicker">Overbet Strategy</div>
  <h1>VALUE <span class="gold">OVERBET</span></h1>
  <div class="row">
    <div class="panel">
      <div class="plabel">Hero</div>
      <div class="cards">
        <div class="card"><div class="corner black">A<span class="csuit">&#9827;</span></div><div class="big black">&#9827;</div></div>
        <div class="card"><div class="corner black">K<span class="csuit">&#9827;</span></div><div class="big black">&#9827;</div></div>
      </div>
    </div>
    <div class="panel">
      <div class="plabel">Board</div>
      <div class="cards">
        <div class="card sm"><div class="corner black">7<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
        <div class="card sm"><div class="corner red">7<span class="csuit">&#9830;</span></div><div class="big red">&#9830;</div></div>
        <div class="card sm"><div class="corner black">2<span class="csuit">&#9827;</span></div><div class="big black">&#9827;</div></div>
        <div class="card sm"><div class="corner red">9<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
        <div class="card sm"><div class="corner red">3<span class="csuit">&#9830;</span></div><div class="big red">&#9830;</div></div>
      </div>
      <div class="pot">
        <div class="chips"><div class="chip c1"></div><div class="chip c2"></div><div class="chip c3"></div></div>
        <div class="bet">125% POT BET</div>
      </div>
    </div>
    <div class="panel">
      <div class="plabel">Weak Hand</div>
      <div class="cards">
        <div class="card back"></div>
        <div class="card back"></div>
      </div>
    </div>
  </div>
  <div class="wordmark">&#9824;HoldemMaster</div>
</div>
</body>
</html>
