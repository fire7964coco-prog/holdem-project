<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #0B1F17; }
  #frame {
    position: relative;
    width: 1200px;
    height: 675px;
    overflow: hidden;
    background: linear-gradient(160deg, #0B1F17 0%, #13291D 55%, #0B1F17 100%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 44px 44px 44px 44px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
  }
  .title {
    color: #F2EEE3;
    font-size: 34px;
    font-weight: 800;
    letter-spacing: 0.02em;
    text-align: center;
  }
  .title .gold { color: #C9A227; }
  .label {
    color: #C9A227;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.28em;
    text-align: center;
    margin-bottom: 10px;
  }
  .board-row {
    display: flex;
    gap: 16px;
    justify-content: center;
  }
  .card {
    position: relative;
    width: 100px;
    height: 144px;
    background: linear-gradient(175deg, #FDFBF4 0%, #F2EEE3 100%);
    border-radius: 10px;
    box-shadow: 0 6px 14px rgba(0,0,0,0.45), 0 1px 3px rgba(0,0,0,0.3);
  }
  .card .corner {
    position: absolute;
    top: 7px;
    left: 9px;
    font-size: 26px;
    font-weight: 800;
    line-height: 1.0;
    text-align: center;
  }
  .card .corner .csuit {
    display: block;
    font-size: 18px;
    line-height: 1.0;
    margin-top: 1px;
  }
  .card .big {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-42%, -44%);
    font-size: 62px;
    line-height: 1;
  }
  .card.sm { width: 68px; height: 98px; border-radius: 8px; }
  .card.sm .corner { top: 5px; left: 6px; font-size: 18px; }
  .card.sm .corner .csuit { font-size: 13px; }
  .card.sm .big { font-size: 40px; }
  .black { color: #1a1a1a; }
  .red { color: #c0392b; }
  .hand-block {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 22px;
  }
  .hand-label {
    color: #F2EEE3;
    font-size: 20px;
    font-weight: 700;
  }
  .hand-cards { display: flex; gap: 10px; }
  .caption {
    color: #F2EEE3;
    font-size: 20px;
    font-weight: 500;
    text-align: center;
    opacity: 0.92;
  }
  .caption b { color: #C9A227; font-weight: 800; }
  .caption .lose { color: #B4462E; font-weight: 800; }
  .badge {
    display: inline-block;
    background: linear-gradient(175deg, #D9B33A 0%, #C9A227 100%);
    color: #0B1F17;
    font-size: 24px;
    font-weight: 900;
    letter-spacing: 0.06em;
    padding: 14px 40px;
    border-radius: 999px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.4);
  }
  .badge .arrow { color: #2E7D46; padding: 0 6px; }
  .wordmark {
    position: absolute;
    right: 44px;
    bottom: 44px;
    color: #C9A227;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.04em;
    opacity: 0.9;
  }
</style>
</head>
<body>
<div id="frame">

  <div class="title">The Board Plays — <span class="gold">Everyone Chops</span></div>

  <div>
    <div class="label">THE BOARD</div>
    <div class="board-row">
      <div class="card"><div class="corner black">A<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
      <div class="card"><div class="corner red">K<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
      <div class="card"><div class="corner black">Q<span class="csuit">&#9827;</span></div><div class="big black">&#9827;</div></div>
      <div class="card"><div class="corner red">J<span class="csuit">&#9830;</span></div><div class="big red">&#9830;</div></div>
      <div class="card"><div class="corner black">10<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
    </div>
  </div>

  <div class="hand-block">
    <div class="hand-label">Your hand:</div>
    <div class="hand-cards">
      <div class="card sm"><div class="corner red">9<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
      <div class="card sm"><div class="corner black">7<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
    </div>
  </div>

  <div class="caption">Your best five is only <span class="lose">K-Q-J-10-9</span> — lower than the board's <b>A-K-Q-J-10</b>.</div>

  <div class="badge">THE BOARD PLAYS <span class="arrow">&#8594;</span> SPLIT POT</div>

  <div class="wordmark">&#9824;HoldemMaster</div>
</div>
</body>
</html>
