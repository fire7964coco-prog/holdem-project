<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:#0B1F17; }
.stage {
  position:relative; width:1200px; height:675px; overflow:hidden; padding:44px;
  background:
    radial-gradient(ellipse 900px 500px at 50% -10%, rgba(46,125,70,0.26), rgba(46,125,70,0) 65%),
    linear-gradient(160deg,#0B1F17 0%,#13291D 100%);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
h1 { color:#C9A227; font-size:60px; font-weight:900; text-align:center; letter-spacing:.08em; text-shadow:0 2px 14px rgba(0,0,0,.5); margin-top:6px; }
.wordmark { position:absolute; right:44px; bottom:44px; color:#C9A227; font-size:15px; font-weight:800; letter-spacing:.04em; opacity:.9; z-index:6; }

.ladder { position:absolute; left:64px; right:64px; bottom:92px; display:flex; align-items:flex-end; gap:20px; }
.step { flex:1; background:rgba(0,0,0,.28); border:2px solid rgba(201,162,39,.55); border-radius:14px 14px 8px 8px; display:flex; flex-direction:column; align-items:center; padding-top:20px; }
.step .no { color:#C9A227; font-size:18px; font-weight:800; letter-spacing:.14em; }
.step .buyin { color:#F2EEE3; font-size:36px; font-weight:900; margin-top:8px; }
.s1 { height:130px; } .s2 { height:185px; } .s3 { height:240px; } .s4 { height:295px; }
.final { flex:1.15; height:355px; background:linear-gradient(180deg,rgba(201,162,39,.18),rgba(0,0,0,.32)); border:2px solid #C9A227; border-radius:14px 14px 8px 8px; display:flex; flex-direction:column; align-items:center; padding-top:20px; box-shadow:0 0 34px rgba(201,162,39,.28); }
.seat { color:#C9A227; font-size:21px; font-weight:900; text-align:center; line-height:1.35; margin-top:16px; letter-spacing:.05em; }

.trophy { width:120px; }
.cup { width:82px; height:60px; margin:0 auto; background:linear-gradient(180deg,#E8C84E,#A87F16); border-radius:0 0 41px 41px; position:relative; box-shadow:0 4px 12px rgba(0,0,0,.4); }
.cup:before,.cup:after { content:""; position:absolute; top:5px; width:23px; height:31px; border:6px solid #C9A227; border-radius:50%; }
.cup:before { left:-23px; border-right:none; }
.cup:after { right:-23px; border-left:none; }
.stem { width:13px; height:19px; background:#A87F16; margin:0 auto; }
.tbase { width:62px; height:12px; background:linear-gradient(180deg,#E8C84E,#A87F16); margin:0 auto; border-radius:3px; }

.card { position:absolute; width:82px; height:118px; border-radius:9px; box-shadow:0 8px 18px rgba(0,0,0,.5); }
.card.goldback { background:repeating-linear-gradient(45deg,#C9A227 0 9px,#8a6d15 9px 18px); border:3px solid #F2EEE3; }
.cardL { left:168px; top:78px; transform:rotate(-14deg); }
.cardL2 { left:222px; top:70px; transform:rotate(-4deg); }
.cardR { right:222px; top:70px; transform:rotate(4deg); }
.cardR2 { right:168px; top:78px; transform:rotate(14deg); }
</style></head>
<body>
<div class="stage">
  <h1>WSOP 2026</h1>
  <div class="card goldback cardL"></div>
  <div class="card goldback cardL2"></div>
  <div class="card goldback cardR"></div>
  <div class="card goldback cardR2"></div>
  <div class="ladder">
    <div class="step s1"><div class="no">STEP 1</div><div class="buyin">$0.50</div></div>
    <div class="step s2"><div class="no">STEP 2</div><div class="buyin">$2</div></div>
    <div class="step s3"><div class="no">STEP 3</div><div class="buyin">$10</div></div>
    <div class="step s4"><div class="no">STEP 4</div><div class="buyin">$150</div></div>
    <div class="final">
      <div class="trophy"><div class="cup"></div><div class="stem"></div><div class="tbase"></div></div>
      <div class="seat">$10,000<br>MAIN EVENT SEAT</div>
    </div>
  </div>
  <div class="wordmark">&#9824;HoldemMaster</div>
</div>
</body></html>
