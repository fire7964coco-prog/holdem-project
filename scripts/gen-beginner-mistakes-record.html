<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:#0B1F17; }
.stage {
  position:relative; width:1200px; height:675px; overflow:hidden; padding:44px;
  background:
    radial-gradient(ellipse 900px 500px at 50% -10%, rgba(46,125,70,0.26), rgba(46,125,70,0) 65%),
    linear-gradient(160deg,#0B1F17 0%,#13291D 100%);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  display:flex; gap:0; align-items:stretch;
}
.divider { width:3px; margin:10px 34px; background:linear-gradient(180deg,rgba(201,162,39,0) 0%,#C9A227 18%,#C9A227 82%,rgba(201,162,39,0) 100%); border-radius:2px; }
.col { position:relative; flex:1; display:flex; flex-direction:column; align-items:center; }
.badge {
  width:76px; height:76px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:44px; font-weight:900; margin-bottom:14px; box-shadow:0 6px 16px rgba(0,0,0,.45);
}
.badge.x { background:#c0392b; color:#F5F0E4; }
.badge.v { background:#2e7d46; color:#F5F0E4; }
.tag { font-size:34px; font-weight:900; letter-spacing:.08em; margin-bottom:22px; }
.tag.bad { color:#c0392b; }
.tag.good { color:#C9A227; }
/* left: scattered receipts */
.mess { position:relative; width:100%; flex:1; }
.rcpt {
  position:absolute; background:#F5F0E4; border-radius:6px; box-shadow:0 6px 14px rgba(0,0,0,.45);
  padding:14px 12px 10px; overflow:hidden;
}
.rcpt::after {
  content:""; position:absolute; left:0; right:0; bottom:-1px; height:10px;
  background:linear-gradient(-45deg,transparent 7px,#F5F0E4 0) left/14px 100% repeat-x;
  transform:rotate(180deg);
}
.rl { height:6px; border-radius:3px; background:#9aa08c; margin-bottom:9px; }
.rl.s { width:55%; } .rl.r { background:#c0392b; opacity:.75; }
.r1 { left:34px; top:14px; width:150px; height:180px; transform:rotate(-14deg); }
.r2 { left:200px; top:56px; width:140px; height:150px; transform:rotate(9deg); }
.r3 { left:96px; top:170px; width:160px; height:160px; transform:rotate(21deg); z-index:2; }
.r4 { left:280px; top:186px; width:130px; height:140px; transform:rotate(-19deg); }
.r5 { left:6px; top:230px; width:120px; height:120px; transform:rotate(-5deg); }
.scrib {
  position:absolute; width:70px; height:34px;
  border:4px solid rgba(192,57,43,.8); border-radius:50%; border-top-color:transparent;
  transform:rotate(-24deg);
}
.s1 { left:236px; top:16px; } .s2 { left:22px; top:150px; transform:rotate(38deg); }
/* right: clean spreadsheet + rising graph */
.sheet {
  position:relative; width:400px; background:#F5F0E4; border-radius:14px;
  box-shadow:0 10px 24px rgba(0,0,0,.5); overflow:hidden; padding-bottom:16px;
}
.shead { height:34px; background:#C9A227; display:flex; }
.shead .hc { flex:1; border-right:2px solid rgba(11,31,23,.25); }
.shead .hc:last-child { border-right:none; }
.row { display:flex; height:30px; border-bottom:2px solid #ddd6c2; }
.row .c { flex:1; border-right:2px solid #ddd6c2; position:relative; }
.row .c:last-child { border-right:none; }
.row .c i { position:absolute; left:10px; right:10px; top:50%; height:6px; margin-top:-3px; border-radius:3px; background:#b9b29a; }
.row .c i.g { background:#2e7d46; } .row .c i.rd { background:#c0392b; width:46%; }
.graph { position:relative; margin:14px 18px 0; height:130px; background:#efe9d8; border-radius:10px; overflow:hidden; }
.gb { position:absolute; bottom:0; width:44px; border-radius:6px 6px 0 0; background:#2e7d46; }
.g1 { left:26px;  height:34px; opacity:.55; }
.g2 { left:96px;  height:58px; opacity:.7; }
.g3 { left:166px; height:84px; opacity:.85; }
.g4 { left:236px; height:112px; }
.arrow { position:absolute; right:26px; bottom:18px; width:0; height:0;
  border-left:22px solid transparent; border-right:22px solid transparent; border-bottom:34px solid #C9A227;
  transform:rotate(38deg);
}
.arrow::after { content:""; position:absolute; left:-8px; top:32px; width:16px; height:44px; background:#C9A227; transform:rotate(0deg); border-radius:3px; }
.wordmark { position:absolute; right:44px; bottom:44px; color:#C9A227; font-size:15px; font-weight:800; letter-spacing:.04em; opacity:.9; z-index:5; }
</style>
</head>
<body>
<div class="stage">
  <div class="col">
    <div class="badge x">&#10005;</div>
    <div class="tag bad">NO RECORD</div>
    <div class="mess">
      <div class="rcpt r1"><div class="rl"></div><div class="rl s"></div><div class="rl r"></div><div class="rl"></div><div class="rl s"></div><div class="rl r"></div></div>
      <div class="rcpt r2"><div class="rl s"></div><div class="rl"></div><div class="rl r"></div><div class="rl s"></div></div>
      <div class="rcpt r3"><div class="rl"></div><div class="rl r"></div><div class="rl s"></div><div class="rl"></div><div class="rl r"></div></div>
      <div class="rcpt r4"><div class="rl s"></div><div class="rl"></div><div class="rl r"></div></div>
      <div class="rcpt r5"><div class="rl"></div><div class="rl s"></div><div class="rl r"></div></div>
      <div class="scrib s1"></div><div class="scrib s2"></div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="col">
    <div class="badge v">&#10003;</div>
    <div class="tag good">RECORD</div>
    <div class="sheet">
      <div class="shead"><div class="hc"></div><div class="hc"></div><div class="hc"></div><div class="hc"></div></div>
      <div class="row"><div class="c"><i></i></div><div class="c"><i></i></div><div class="c"><i class="g"></i></div><div class="c"><i></i></div></div>
      <div class="row"><div class="c"><i></i></div><div class="c"><i class="rd"></i></div><div class="c"><i></i></div><div class="c"><i class="g"></i></div></div>
      <div class="row"><div class="c"><i></i></div><div class="c"><i></i></div><div class="c"><i class="g"></i></div><div class="c"><i></i></div></div>
      <div class="row"><div class="c"><i></i></div><div class="c"><i class="g"></i></div><div class="c"><i></i></div><div class="c"><i class="g"></i></div></div>
      <div class="graph">
        <div class="gb g1"></div><div class="gb g2"></div><div class="gb g3"></div><div class="gb g4"></div>
        <div class="arrow"></div>
      </div>
    </div>
  </div>
  <div class="wordmark">&#9824;HoldemMaster</div>
</div>
</body>
</html>
