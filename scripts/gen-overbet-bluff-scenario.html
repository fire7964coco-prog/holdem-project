<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:#0B1F17; }
.stage {
  position:relative; width:1200px; height:675px; overflow:hidden; padding:44px;
  background:
    radial-gradient(ellipse 900px 500px at 50% -10%, rgba(46,125,70,0.26), rgba(46,125,70,0) 65%),
    linear-gradient(160deg,#0B1F17 0%,#13291D 100%);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  display:flex; flex-direction:column; align-items:center;
}
.kicker { color:#C9A227; font-size:15px; font-weight:700; letter-spacing:.28em; text-transform:uppercase; text-align:center; margin-bottom:8px; }
h1 { color:#F2EEE3; font-size:44px; font-weight:800; text-align:center; text-shadow:0 2px 12px rgba(0,0,0,.45); }
h1 .gold { color:#C9A227; }
.wordmark { position:absolute; right:44px; bottom:44px; color:#C9A227; font-size:15px; font-weight:800; letter-spacing:.04em; opacity:.9; }

.row { display:flex; align-items:center; justify-content:center; gap:22px; margin-top:36px; }
.panel { background:rgba(0,0,0,.28); border:2px solid rgba(201,162,39,.55); border-radius:16px; padding:22px 26px; display:flex; flex-direction:column; align-items:center; }
.plabel { color:#C9A227; font-size:15px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; margin-bottom:14px; white-space:nowrap; }
.cards { display:flex; gap:12px; position:relative; }

.card { position:relative; width:96px; height:138px; background:linear-gradient(175deg,#FDFBF4 0%,#F2EEE3 100%); border-radius:10px; box-shadow:0 6px 14px rgba(0,0,0,.45),0 1px 3px rgba(0,0,0,.3); }
.card .corner { position:absolute; top:7px; left:9px; font-size:25px; font-weight:800; line-height:1; text-align:center; }
.card .corner .csuit { display:block; font-size:17px; line-height:1; margin-top:1px; }
.card .big { position:absolute; top:50%; left:50%; transform:translate(-42%,-44%); font-size:60px; line-height:1; }
.card.back { background:repeating-linear-gradient(45deg,#7a1420 0 10px,#5c0f18 10px 20px); border:3px solid #F2EEE3; }
.black { color:#1a1a1a; } .red { color:#c0392b; }

.qmark { position:absolute; top:50%; left:50%; transform:translate(-50%,-52%); font-size:72px; font-weight:900; color:#C9A227; text-shadow:0 3px 10px rgba(0,0,0,.6); z-index:2; }

.tower { display:flex; flex-direction:column; align-items:center; }
.coin { width:132px; height:24px; border-radius:12px; border:2px solid rgba(0,0,0,.35); margin-top:-7px; box-shadow:0 3px 6px rgba(0,0,0,.4); }
.coin.gold { background:linear-gradient(#d8b23c,#b8912a); }
.coin.maroon { background:linear-gradient(#8a1a26,#6d1420); }
.coin.green { background:linear-gradient(#3a8a53,#2E7D46); }
.coin.top { margin-top:0; height:30px; background:radial-gradient(circle at 50% 42%, #e2c04f 0 34%, #C9A227 35% 70%, #a5821c 71%); }
.tlabel { color:#C9A227; font-size:20px; font-weight:900; letter-spacing:.12em; margin-top:14px; }

.arrow { display:flex; align-items:center; }
.arrow .shaft { width:64px; height:14px; background:#c0392b; border-radius:7px; }
.arrow .head { width:0; height:0; border-top:16px solid transparent; border-bottom:16px solid transparent; }
.arrow.toright .head { border-left:24px solid #c0392b; }
.arrow.toleft .head { border-right:24px solid #c0392b; }
</style>
</head>
<body>
<div class="stage">
  <div class="kicker">Overbet Strategy</div>
  <h1>BLUFF <span class="gold">OVERBET</span></h1>
  <div class="row">
    <div class="panel">
      <div class="plabel">Hero &mdash; Weak Hand</div>
      <div class="cards">
        <div class="card"><div class="corner black">9<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
        <div class="card"><div class="corner black">8<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
      </div>
    </div>
    <div class="arrow toright"><div class="shaft"></div><div class="head"></div></div>
    <div class="tower">
      <div class="coin top"></div>
      <div class="coin gold"></div>
      <div class="coin maroon"></div>
      <div class="coin gold"></div>
      <div class="coin green"></div>
      <div class="coin gold"></div>
      <div class="coin maroon"></div>
      <div class="coin gold"></div>
      <div class="coin green"></div>
      <div class="coin gold"></div>
    </div>
    <div class="arrow toleft"><div class="head"></div><div class="shaft"></div></div>
    <div class="panel">
      <div class="plabel">Opponent &mdash; Unknown</div>
      <div class="cards">
        <div class="card back"></div>
        <div class="card back"></div>
        <div class="qmark">?</div>
      </div>
    </div>
  </div>
  <div class="wordmark">&#9824;HoldemMaster</div>
</div>
</body>
</html>
