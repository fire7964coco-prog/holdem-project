<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:#0B1F17; }
.stage {
  position:relative; width:1200px; height:675px; overflow:hidden; padding:44px;
  background:
    radial-gradient(ellipse 900px 500px at 50% -10%, rgba(46,125,70,0.26), rgba(46,125,70,0) 65%),
    linear-gradient(160deg,#0B1F17 0%,#13291D 100%);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  display:flex; flex-direction:column; align-items:center;
}
.kicker { color:#C9A227; font-size:15px; font-weight:700; letter-spacing:.22em; text-align:center; margin-bottom:8px; }
h1 { color:#F2EEE3; font-size:44px; font-weight:800; text-align:center; text-shadow:0 2px 12px rgba(0,0,0,.45); }
h1 .gold { color:#C9A227; }
.wordmark { position:absolute; right:44px; bottom:44px; color:#C9A227; font-size:15px; font-weight:800; letter-spacing:.04em; opacity:.9; }

.compare { display:flex; align-items:stretch; margin-top:28px; width:1090px;
  background:rgba(0,0,0,.28); border:2px solid rgba(201,162,39,.55); border-radius:16px; padding:30px 0; }
.col { flex:1; padding:0 44px; display:flex; flex-direction:column; }
.divider { width:2px; background:#C9A227; margin:6px 0; flex:none; box-shadow:0 0 10px rgba(201,162,39,.5); }
.col-title { font-size:33px; font-weight:900; text-align:center; margin-bottom:22px; letter-spacing:-.01em; }
.col-title.legal { color:#5FBF7A; }
.col-title.illegal { color:#E05C4B; }

.row { display:flex; align-items:center; gap:16px; padding:13px 0; }
.mark { width:40px; height:40px; border-radius:50%; flex:none;
  display:flex; align-items:center; justify-content:center;
  font-size:24px; font-weight:900; }
.mark.ok { background:rgba(95,191,122,.16); border:2px solid #5FBF7A; color:#5FBF7A; }
.mark.no { background:rgba(224,92,75,.14); border:2px solid #E05C4B; color:#E05C4B; }
.btext { color:#F2EEE3; font-size:26px; font-weight:700; line-height:1.3; letter-spacing:-.01em; }

.baseline { margin-top:26px; padding:16px 46px; border-radius:999px;
  background:rgba(201,162,39,.14); border:2px solid #C9A227;
  color:#C9A227; font-size:29px; font-weight:900; letter-spacing:-.01em; }
</style>
</head>
<body>
<div class="stage">
  <div class="kicker">한눈에 구분하기</div>
  <h1><span class="gold">합법</span> 홀덤펍 vs <span class="gold">불법</span> 홀덤펍</h1>

  <div class="compare">
    <div class="col">
      <div class="col-title legal">합법 홀덤펍</div>
      <div class="row"><div class="mark ok">&#10003;</div><div class="btext">칩은 매장 내 사용만</div></div>
      <div class="row"><div class="mark ok">&#10003;</div><div class="btext">상품은 음료 쿠폰 · 트로피</div></div>
      <div class="row"><div class="mark ok">&#10003;</div><div class="btext">창문 개방 · 정식 신고</div></div>
    </div>
    <div class="divider"></div>
    <div class="col">
      <div class="col-title illegal">불법 홀덤펍</div>
      <div class="row"><div class="mark no">&#10005;</div><div class="btext">칩을 현금으로 환전</div></div>
      <div class="row"><div class="mark no">&#10005;</div><div class="btext">현금 · 시드권 상금 지급</div></div>
      <div class="row"><div class="mark no">&#10005;</div><div class="btext">전체 썬팅 · 무신고 영업</div></div>
    </div>
  </div>

  <div class="baseline">기준: 칩의 현금 환전 여부</div>

  <div class="wordmark">&#9824;HoldemMaster</div>
</div>
</body>
</html>
