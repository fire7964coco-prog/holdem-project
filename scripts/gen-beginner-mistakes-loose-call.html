<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:#0B1F17; }
.stage {
  position:relative; width:1200px; height:675px; overflow:hidden; padding:44px;
  background:
    radial-gradient(ellipse 900px 500px at 50% -10%, rgba(46,125,70,0.26), rgba(46,125,70,0) 65%),
    linear-gradient(160deg,#0B1F17 0%,#13291D 100%);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
/* felt edge at bottom */
.felt {
  position:absolute; left:-60px; right:-60px; bottom:-220px; height:420px;
  background:radial-gradient(ellipse at 50% 0%, #1d5c38 0%, #14432a 55%, #0e321f 100%);
  border-radius:50% 50% 0 0; box-shadow:inset 0 14px 30px rgba(0,0,0,.35);
}
/* ---- left: player fanning many card backs ---- */
.player { position:absolute; left:120px; bottom:150px; width:360px; height:400px; }
.head { position:absolute; left:130px; top:0; width:104px; height:104px; border-radius:50%; background:#F5F0E4; box-shadow:0 6px 14px rgba(0,0,0,.4); }
.hair { position:absolute; left:126px; top:-8px; width:112px; height:56px; border-radius:56px 56px 0 0; background:#1e3a5f; }
.eyeL,.eyeR { position:absolute; top:52px; width:11px; height:11px; border-radius:50%; background:#1a1a1a; }
.eyeL { left:158px; } .eyeR { left:196px; }
.smile { position:absolute; left:166px; top:74px; width:32px; height:14px; border:4px solid #1a1a1a; border-top:none; border-radius:0 0 16px 16px; }
.body { position:absolute; left:92px; top:100px; width:180px; height:190px; border-radius:60px 60px 18px 18px; background:#1e3a5f; box-shadow:0 8px 18px rgba(0,0,0,.4); }
.armL { position:absolute; left:64px; top:130px; width:120px; height:34px; border-radius:17px; background:#1e3a5f; transform:rotate(38deg); }
.armR { position:absolute; left:190px; top:130px; width:120px; height:34px; border-radius:17px; background:#1e3a5f; transform:rotate(-38deg); }
/* huge fan of card backs */
.fan { position:absolute; left:182px; bottom:36px; width:0; height:0; }
.back {
  position:absolute; bottom:0; left:-45px; width:90px; height:128px; border-radius:9px;
  background:repeating-linear-gradient(45deg,#7a1420 0 10px,#5c0f18 10px 20px);
  border:3px solid #F2EEE3; box-shadow:0 6px 14px rgba(0,0,0,.45);
  transform-origin:50% 112%;
}
.b1 { transform:rotate(-64deg); } .b2 { transform:rotate(-48deg); }
.b3 { transform:rotate(-32deg); } .b4 { transform:rotate(-16deg); }
.b5 { transform:rotate(0deg); }   .b6 { transform:rotate(16deg); }
.b7 { transform:rotate(32deg); }  .b8 { transform:rotate(48deg); }
.b9 { transform:rotate(64deg); }
/* ---- right: rising bar chart ---- */
.chart {
  position:absolute; right:96px; top:96px; width:460px; height:440px;
  background:rgba(0,0,0,.28); border:2px solid rgba(201,162,39,.55); border-radius:16px;
  padding:34px 38px 0;
}
.axis { position:absolute; left:38px; right:38px; bottom:34px; height:4px; background:#F2EEE3; border-radius:2px; opacity:.85; }
.bars { position:absolute; left:38px; right:38px; bottom:38px; top:34px; display:flex; align-items:flex-end; justify-content:space-between; }
.bar { width:74px; border-radius:8px 8px 0 0; }
.v1 { height:22%; background:#F5F0E4; }
.v2 { height:38%; background:#F5F0E4; }
.v3 { height:56%; background:#1e3a5f; border:2px solid rgba(242,238,227,.5); }
.v4 { position:relative; height:84%; background:linear-gradient(180deg,#d24537 0%,#c0392b 100%); box-shadow:0 0 22px rgba(192,57,43,.5); }
.label {
  position:absolute; top:-58px; left:50%; transform:translateX(-50%);
  background:#c0392b; color:#F5F0E4; font-size:26px; font-weight:900; letter-spacing:.02em;
  padding:8px 18px; border-radius:12px; white-space:nowrap; box-shadow:0 5px 12px rgba(0,0,0,.45);
}
.label::after {
  content:""; position:absolute; left:50%; bottom:-9px; transform:translateX(-50%);
  border-left:10px solid transparent; border-right:10px solid transparent; border-top:10px solid #c0392b;
}
.wordmark { position:absolute; right:44px; bottom:44px; color:#C9A227; font-size:15px; font-weight:800; letter-spacing:.04em; opacity:.9; z-index:5; }
</style>
</head>
<body>
<div class="stage">
  <div class="felt"></div>
  <div class="player">
    <div class="body"></div>
    <div class="hair"></div>
    <div class="head"></div>
    <div class="eyeL"></div><div class="eyeR"></div><div class="smile"></div>
    <div class="armL"></div><div class="armR"></div>
    <div class="fan">
      <div class="back b1"></div><div class="back b2"></div><div class="back b3"></div>
      <div class="back b4"></div><div class="back b5"></div><div class="back b6"></div>
      <div class="back b7"></div><div class="back b8"></div><div class="back b9"></div>
    </div>
  </div>
  <div class="chart">
    <div class="bars">
      <div class="bar v1"></div>
      <div class="bar v2"></div>
      <div class="bar v3"></div>
      <div class="bar v4"><div class="label">VPIP 70%</div></div>
    </div>
    <div class="axis"></div>
  </div>
  <div class="wordmark">&#9824;HoldemMaster</div>
</div>
</body>
</html>
