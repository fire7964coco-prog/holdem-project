<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 675px; }
  .frame {
    position: relative;
    width: 1200px;
    height: 675px;
    overflow: hidden;
    background: linear-gradient(135deg, #0B1F17 0%, #13291D 52%, #0B1F17 100%);
    font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    color: #F2EEE3;
    padding: 46px 52px 44px;
    display: flex;
    flex-direction: column;
  }
  /* subtle felt glow */
  .frame::before {
    content: "";
    position: absolute;
    left: 50%; top: 42%;
    width: 900px; height: 560px;
    transform: translate(-50%, -50%);
    background: radial-gradient(ellipse at center, rgba(46,125,70,0.16) 0%, rgba(46,125,70,0) 70%);
    pointer-events: none;
  }
  .title {
    position: relative;
    text-align: center;
    font-size: 40px;
    font-weight: 800;
    letter-spacing: 0.01em;
    line-height: 1.15;
    margin-bottom: 26px;
  }
  .title .gold { color: #C9A227; }
  .main {
    position: relative;
    flex: 1;
    display: flex;
    align-items: stretch;
    gap: 96px;
  }
  .col {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-width: 0;
  }
  .badge {
    align-self: center;
    font-size: 24px;
    font-weight: 800;
    letter-spacing: 0.14em;
    padding: 12px 30px;
    border-radius: 999px;
    margin-bottom: 6px;
    white-space: nowrap;
  }
  .badge.cash {
    color: #EAF6EC;
    background: rgba(46,125,70,0.28);
    border: 2px solid #2E7D46;
  }
  .badge.tour {
    color: #F6ECC8;
    background: rgba(201,162,39,0.16);
    border: 2px solid #C9A227;
  }
  .row {
    display: flex;
    align-items: center;
    gap: 16px;
    background: rgba(242,238,227,0.055);
    border: 1px solid rgba(242,238,227,0.10);
    border-radius: 14px;
    padding: 20px 22px;
    flex: 1;
  }
  .col.cash-col .row { border-left: 5px solid #2E7D46; }
  .col.tour-col .row { border-left: 5px solid #C9A227; }
  .chip {
    flex: 0 0 auto;
    width: 42px; height: 42px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 19px;
    font-weight: 700;
  }
  .chip.green {
    background: #17402A;
    border: 3px dashed #2E7D46;
    color: #7FC28F;
  }
  .chip.gold {
    background: #3A2F12;
    border: 3px dashed #C9A227;
    color: #E4C766;
  }
  .row-text {
    font-size: 21px;
    font-weight: 600;
    line-height: 1.3;
    color: #F2EEE3;
  }
  .vs-wrap {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    z-index: 3;
  }
  .vs {
    width: 92px; height: 92px;
    border-radius: 50%;
    background: radial-gradient(circle at 34% 30%, #E4C766 0%, #C9A227 55%, #9A7A1B 100%);
    color: #0B1F17;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 34px;
    font-weight: 900;
    letter-spacing: 0.03em;
    box-shadow: 0 0 0 6px rgba(201,162,39,0.18), 0 8px 24px rgba(0,0,0,0.45);
  }
  .divider {
    position: absolute;
    left: 50%; top: 6%;
    height: 88%;
    width: 2px;
    transform: translateX(-50%);
    background: linear-gradient(to bottom, rgba(201,162,39,0) 0%, rgba(201,162,39,0.35) 50%, rgba(201,162,39,0) 100%);
    z-index: 1;
  }
  .footer {
    position: relative;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    margin-top: 22px;
  }
  .wordmark {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: #C9A227;
    opacity: 0.9;
  }
  .wordmark .suit { color: #2E7D46; margin-right: 6px; }
</style>
</head>
<body>
  <div class="frame">
    <div class="title">Cash Game <span class="gold">vs</span> Tournament Poker</div>
    <div class="main">
      <div class="col cash-col">
        <div class="badge cash">CASH GAME</div>
        <div class="row">
          <div class="chip green">$</div>
          <div class="row-text">Chips = real money</div>
        </div>
        <div class="row">
          <div class="chip green">♣</div>
          <div class="row-text">Blinds stay fixed</div>
        </div>
        <div class="row">
          <div class="chip green">♠</div>
          <div class="row-text">Leave anytime with your stack</div>
        </div>
      </div>
      <div class="col tour-col">
        <div class="badge tour">TOURNAMENT</div>
        <div class="row">
          <div class="chip gold">♦</div>
          <div class="row-text">Chips have no cash value</div>
        </div>
        <div class="row">
          <div class="chip gold">♥</div>
          <div class="row-text">Blinds rise on a clock</div>
        </div>
        <div class="row">
          <div class="chip gold">♠</div>
          <div class="row-text">Play until you bust or win</div>
        </div>
      </div>
      <div class="divider"></div>
      <div class="vs-wrap"><div class="vs">VS</div></div>
    </div>
    <div class="footer">
      <div class="wordmark"><span class="suit">♠</span>HoldemMaster</div>
    </div>
  </div>
</body>
</html>
