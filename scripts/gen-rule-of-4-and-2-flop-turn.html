<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:#0B1F17; }
.stage {
  position:relative; width:1200px; height:675px; overflow:hidden; padding:36px 44px 40px;
  background:
    radial-gradient(ellipse 900px 500px at 50% -10%, rgba(46,125,70,0.26), rgba(46,125,70,0) 65%),
    linear-gradient(160deg,#0B1F17 0%,#13291D 100%);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  display:flex; flex-direction:column; align-items:center; justify-content:space-between;
}
h1 { color:#F2EEE3; font-size:36px; font-weight:800; text-align:center; text-shadow:0 2px 12px rgba(0,0,0,.45); }
h1 .gold { color:#C9A227; }
.sub { color:#C9A227; font-size:14px; font-weight:700; text-align:center; margin-top:6px; }
.split { display:flex; align-items:stretch; gap:0; }
.panel { padding:22px 34px 18px; display:flex; flex-direction:column; align-items:center; gap:14px; }
.panel .street { color:#F2EEE3; font-size:24px; font-weight:900; letter-spacing:.22em; }
.panel .mult { color:#C9A227; font-size:52px; font-weight:900; text-shadow:0 0 20px rgba(201,162,39,.45); line-height:1; }
.panel .cards { display:flex; gap:12px; }
.panel .note { color:#F2EEE3; font-size:14px; font-weight:700; opacity:.85; }
.divider { width:2px; background:linear-gradient(180deg, rgba(201,162,39,0), rgba(201,162,39,.7), rgba(201,162,39,0)); margin:0 30px; }
.card { position:relative; width:84px; height:121px; background:linear-gradient(175deg,#FDFBF4 0%,#F2EEE3 100%); border-radius:9px; box-shadow:0 6px 14px rgba(0,0,0,.45),0 1px 3px rgba(0,0,0,.3); }
.card .corner { position:absolute; top:6px; left:8px; font-size:22px; font-weight:800; line-height:1; text-align:center; }
.card .corner .csuit { display:block; font-size:15px; line-height:1; margin-top:1px; }
.card .big { position:absolute; top:50%; left:50%; transform:translate(-42%,-44%); font-size:52px; line-height:1; }
.black { color:#1a1a1a; } .red { color:#c0392b; }
.formula { color:#F2EEE3; font-size:15px; font-weight:700; opacity:.9; }
.formula .gold { color:#C9A227; font-weight:900; }
.wordmark { position:absolute; right:44px; bottom:40px; color:#C9A227; font-size:15px; font-weight:800; letter-spacing:.04em; opacity:.9; }
</style>
</head>
<body>
<div class="stage">
  <div>
    <h1>Rule of <span class="gold">4</span> and <span class="gold">2</span></h1>
    <div class="sub">아웃츠 개수로 승률을 어림하는 법 &#8212; 서로 다른 두 판의 보드 예시</div>
  </div>

  <div class="split">
    <div class="panel">
      <div class="street">FLOP</div>
      <div class="mult">x4</div>
      <div class="cards">
        <div class="card"><div class="corner black">A<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
        <div class="card"><div class="corner red">K<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
        <div class="card"><div class="corner black">5<span class="csuit">&#9827;</span></div><div class="big black">&#9827;</div></div>
      </div>
      <div class="note">턴 + 리버 2장 남음</div>
    </div>
    <div class="divider"></div>
    <div class="panel">
      <div class="street">TURN</div>
      <div class="mult">x2</div>
      <div class="cards">
        <div class="card"><div class="corner black">5<span class="csuit">&#9827;</span></div><div class="big black">&#9827;</div></div>
        <div class="card"><div class="corner red">K<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
        <div class="card"><div class="corner black">9<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
        <div class="card"><div class="corner red">7<span class="csuit">&#9830;</span></div><div class="big red">&#9830;</div></div>
      </div>
      <div class="note">리버 1장 남음</div>
    </div>
  </div>

  <div class="formula">아웃츠 &#215; <span class="gold">4</span> = 플랍 기준 승률(%) &#183; 아웃츠 &#215; <span class="gold">2</span> = 턴 기준 승률(%)</div>

  <div class="wordmark">&#9824;HoldemMaster</div>
</div>
</body>
</html>
