<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:#0B1F17; }
.stage {
  position:relative; width:1200px; height:675px; overflow:hidden; padding:38px 44px 40px;
  background:
    radial-gradient(ellipse 900px 500px at 50% -10%, rgba(46,125,70,0.26), rgba(46,125,70,0) 65%),
    linear-gradient(160deg,#0B1F17 0%,#13291D 100%);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  display:flex; flex-direction:column; align-items:center; justify-content:space-between;
}
h1 { color:#F2EEE3; font-size:34px; font-weight:800; text-align:center; text-shadow:0 2px 12px rgba(0,0,0,.45); }
h1 .gold { color:#C9A227; }
.sub { color:#C9A227; font-size:14px; font-weight:700; text-align:center; margin-top:6px; }
.players { display:flex; gap:22px; }
.panel {
  background:rgba(0,0,0,.28); border:2px solid rgba(201,162,39,.5); border-radius:16px;
  padding:18px 18px 14px; display:flex; flex-direction:column; align-items:center; gap:12px;
}
.panel .plabel { color:#F2EEE3; font-size:16px; font-weight:800; }
.panel .cards { display:flex; align-items:center; }
.card { position:relative; width:64px; height:92px; background:linear-gradient(175deg,#FDFBF4 0%,#F2EEE3 100%); border-radius:8px; box-shadow:0 5px 12px rgba(0,0,0,.45),0 1px 3px rgba(0,0,0,.3); margin-left:8px; }
.card:first-child { margin-left:0; }
.card .corner { position:absolute; top:5px; left:6px; font-size:17px; font-weight:800; line-height:1; text-align:center; }
.card .corner .csuit { display:block; font-size:12px; line-height:1; margin-top:1px; }
.card .big { position:absolute; top:50%; left:50%; transform:translate(-42%,-44%); font-size:38px; line-height:1; }
.card.back { background:repeating-linear-gradient(45deg,#7a1420 0 10px,#5c0f18 10px 20px); border:2px solid #F2EEE3; }
.card.back + .card.up { margin-left:20px; }
.black { color:#1a1a1a; } .red { color:#c0392b; }
.tag { display:flex; gap:64px; color:#C9A227; font-size:12px; font-weight:700; }
.bottom { display:flex; align-items:center; gap:14px; }
.dbtn {
  width:38px; height:38px; border-radius:50%;
  background:linear-gradient(175deg,#FDFBF4,#E8E2D0); color:#1a1a1a;
  font-size:20px; font-weight:900; display:flex; align-items:center; justify-content:center;
  box-shadow:0 3px 8px rgba(0,0,0,.55);
}
.chips { display:flex; gap:7px; }
.chip { width:28px; height:28px; border-radius:50%; border:4px dashed #F2EEE3; box-shadow:0 3px 6px rgba(0,0,0,.5); }
.chip.g { background:#C9A227; } .chip.r { background:#a33327; } .chip.b { background:#1f3d63; }
.blabel { color:#F2EEE3; font-size:14px; font-weight:700; opacity:.85; }
.wordmark { position:absolute; right:44px; bottom:40px; color:#C9A227; font-size:15px; font-weight:800; letter-spacing:.04em; opacity:.9; }
</style>
</head>
<body>
<div class="stage">
  <div>
    <h1>세븐 카드 스터드 &#8212; <span class="gold">업카드</span>가 공개된다</h1>
    <div class="sub">커뮤니티 카드 없이 각자 카드를 받는 게임 &#183; 다운 2장 + 업카드 4장 (6번째 스트리트)</div>
  </div>

  <div class="players">
    <div class="panel">
      <div class="plabel">플레이어 1</div>
      <div class="cards">
        <div class="card back"></div><div class="card back"></div>
        <div class="card up"><div class="corner black">K<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
        <div class="card"><div class="corner red">9<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
        <div class="card"><div class="corner red">4<span class="csuit">&#9830;</span></div><div class="big red">&#9830;</div></div>
        <div class="card"><div class="corner black">J<span class="csuit">&#9827;</span></div><div class="big black">&#9827;</div></div>
      </div>
    </div>
    <div class="panel">
      <div class="plabel">플레이어 2</div>
      <div class="cards">
        <div class="card back"></div><div class="card back"></div>
        <div class="card up"><div class="corner red">Q<span class="csuit">&#9830;</span></div><div class="big red">&#9830;</div></div>
        <div class="card"><div class="corner black">7<span class="csuit">&#9827;</span></div><div class="big black">&#9827;</div></div>
        <div class="card"><div class="corner black">2<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
        <div class="card"><div class="corner red">10<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
      </div>
    </div>
    <div class="panel">
      <div class="plabel">플레이어 3</div>
      <div class="cards">
        <div class="card back"></div><div class="card back"></div>
        <div class="card up"><div class="corner black">A<span class="csuit">&#9827;</span></div><div class="big black">&#9827;</div></div>
        <div class="card"><div class="corner red">8<span class="csuit">&#9830;</span></div><div class="big red">&#9830;</div></div>
        <div class="card"><div class="corner black">5<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
        <div class="card"><div class="corner red">6<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
      </div>
    </div>
  </div>

  <div class="bottom">
    <div class="dbtn">D</div>
    <div class="chips"><div class="chip g"></div><div class="chip r"></div><div class="chip b"></div></div>
    <div class="blabel">다운 카드 2장은 뒷면, 업카드 4장은 모두에게 공개</div>
  </div>

  <div class="wordmark">&#9824;HoldemMaster</div>
</div>
</body>
</html>
