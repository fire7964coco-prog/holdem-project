<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:#0B1F17; }
.stage {
  position:relative; width:1200px; height:675px; overflow:hidden; padding:44px;
  background:
    radial-gradient(ellipse 900px 500px at 50% -10%, rgba(46,125,70,0.26), rgba(46,125,70,0) 65%),
    linear-gradient(160deg,#0B1F17 0%,#13291D 100%);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  display:flex; align-items:center; justify-content:center;
}
.frame { width:1020px; border:2px solid rgba(201,162,39,.75); outline:1px solid rgba(201,162,39,.35); outline-offset:8px; border-radius:14px; padding:52px 70px 58px; background:rgba(0,0,0,.24); display:flex; flex-direction:column; align-items:center; }
.kicker { color:#C9A227; font-size:15px; font-weight:700; letter-spacing:.3em; text-transform:uppercase; margin-bottom:14px; }
h1 { font-family:Georgia,"Times New Roman",serif; color:#C9A227; font-size:60px; font-weight:700; letter-spacing:.06em; text-align:center; text-shadow:0 2px 14px rgba(0,0,0,.5); margin-bottom:10px; }
.rule { width:220px; height:2px; background:linear-gradient(90deg,rgba(201,162,39,0),#C9A227,rgba(201,162,39,0)); margin-bottom:36px; }
.list { display:flex; flex-direction:column; gap:26px; }
.item { display:flex; align-items:center; gap:22px; }
.check { flex:0 0 46px; width:46px; height:46px; border-radius:50%; background:#C9A227; color:#0B1F17; font-size:27px; font-weight:900; display:flex; align-items:center; justify-content:center; box-shadow:0 3px 10px rgba(0,0,0,.4); }
.item p { color:#F2EEE3; font-size:29px; font-weight:600; letter-spacing:.01em; }
.wordmark { position:absolute; right:44px; bottom:44px; color:#C9A227; font-size:15px; font-weight:800; letter-spacing:.04em; opacity:.9; }
</style>
</head>
<body>
<div class="stage">
  <div class="frame">
    <div class="kicker">Holdem Strategy</div>
    <h1>OVERBET MASTERY</h1>
    <div class="rule"></div>
    <div class="list">
      <div class="item"><div class="check">&#10003;</div><p>Bet 120&ndash;150% of pot size</p></div>
      <div class="item"><div class="check">&#10003;</div><p>Dry boards only (A-7-2 rainbow)</p></div>
      <div class="item"><div class="check">&#10003;</div><p>Balance value bets and bluffs</p></div>
    </div>
  </div>
  <div class="wordmark">&#9824;HoldemMaster</div>
</div>
</body>
</html>
