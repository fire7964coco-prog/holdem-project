<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:#0B1F17; }
.stage {
  position:relative; width:1200px; height:675px; overflow:hidden; padding:40px 44px;
  background:
    radial-gradient(ellipse 900px 500px at 50% -10%, rgba(46,125,70,0.26), rgba(46,125,70,0) 65%),
    linear-gradient(160deg,#0B1F17 0%,#13291D 100%);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  display:flex; flex-direction:column; align-items:center; gap:18px;
}
h1 { color:#F2EEE3; font-size:35px; font-weight:800; text-align:center; text-shadow:0 2px 12px rgba(0,0,0,.45); }
h1 .gold { color:#C9A227; }
.wordmark { position:absolute; right:44px; bottom:26px; color:#C9A227; font-size:15px; font-weight:800; letter-spacing:.04em; opacity:.9; }

.boardbox { display:flex; align-items:center; gap:18px; background:rgba(0,0,0,.28); border:2px solid rgba(201,162,39,.55); border-radius:16px; padding:16px 24px; }
.seclabel { color:#C9A227; font-size:24px; font-weight:900; }
.cards { display:flex; gap:10px; }

.players { display:flex; gap:26px; }
.player { width:430px; background:rgba(0,0,0,.28); border:2px solid rgba(201,162,39,.55); border-radius:16px; padding:16px 20px; display:flex; flex-direction:column; align-items:center; gap:10px; }
.player.win { border-color:#C9A227; box-shadow:0 0 22px rgba(201,162,39,.22); }
.pname { color:#F2EEE3; font-size:23px; font-weight:800; }
.ptag { font-size:21px; font-weight:900; padding:4px 18px; border-radius:999px; }
.ptag.gold { background:#C9A227; color:#0B1F17; }
.ptag.dim { background:rgba(242,238,227,.14); color:#F2EEE3; }

.banner { background:linear-gradient(180deg,#E8C95A,#C9A227); color:#0B1F17; font-size:30px; font-weight:900; padding:10px 46px; border-radius:12px; box-shadow:0 8px 20px rgba(0,0,0,.45); }

.card { position:relative; width:82px; height:118px; background:linear-gradient(175deg,#FDFBF4 0%,#F2EEE3 100%); border-radius:9px; box-shadow:0 6px 14px rgba(0,0,0,.45),0 1px 3px rgba(0,0,0,.3); }
.card .corner { position:absolute; top:6px; left:8px; font-size:21px; font-weight:800; line-height:1; text-align:center; }
.card .corner .csuit { display:block; font-size:14px; line-height:1; margin-top:1px; }
.card .big { position:absolute; top:50%; left:50%; transform:translate(-42%,-44%); font-size:48px; line-height:1; }
.card.sm { width:72px; height:104px; }
.card.sm .corner { font-size:18px; }
.card.sm .corner .csuit { font-size:12px; }
.card.sm .big { font-size:42px; }
.black { color:#1a1a1a; } .red { color:#c0392b; }
</style>
</head>
<body>
<div class="stage">
  <h1>실전에서 <span class="gold">플러시 vs 스트레이트</span> 착각하기 쉬운 상황</h1>
  <div class="boardbox">
    <div class="seclabel">보드</div>
    <div class="cards">
      <div class="card"><div class="corner red">9<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
      <div class="card"><div class="corner red">8<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
      <div class="card"><div class="corner red">3<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
      <div class="card"><div class="corner black">6<span class="csuit">&#9827;</span></div><div class="big black">&#9827;</div></div>
      <div class="card"><div class="corner red">2<span class="csuit">&#9830;</span></div><div class="big red">&#9830;</div></div>
    </div>
  </div>
  <div class="players">
    <div class="player win">
      <div class="pname">플레이어 A</div>
      <div class="cards">
        <div class="card sm"><div class="corner red">A<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
        <div class="card sm"><div class="corner red">4<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
      </div>
      <div class="ptag gold">플러시</div>
    </div>
    <div class="player">
      <div class="pname">플레이어 B</div>
      <div class="cards">
        <div class="card sm"><div class="corner black">7<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
        <div class="card sm"><div class="corner black">5<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
      </div>
      <div class="ptag dim">스트레이트</div>
    </div>
  </div>
  <div class="banner">플러시 승</div>
  <div class="wordmark">&#9824;HoldemMaster</div>
</div>
</body>
</html>
