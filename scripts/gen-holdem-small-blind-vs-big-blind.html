<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:#F5F0E4; }
.stage {
  position:relative; width:1200px; height:675px; overflow:hidden; padding:38px 44px;
  background:linear-gradient(165deg,#F7F2E7 0%,#F0EAD9 100%);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic","Apple SD Gothic Neo",Roboto,sans-serif;
  display:flex; flex-direction:column; align-items:center;
}
.kicker { color:#2E7D46; font-size:15px; font-weight:800; letter-spacing:.24em; text-align:center; margin-bottom:6px; }
h1 { color:#26311f; font-size:40px; font-weight:800; text-align:center; }
h1 .gold { color:#A5821C; }
.wordmark { position:absolute; right:44px; bottom:20px; color:#A5821C; font-size:15px; font-weight:800; letter-spacing:.04em; }

.main { display:flex; gap:26px; width:1112px; margin-top:22px; align-items:flex-start; }

table { border-collapse:collapse; width:646px; background:#FDFBF4; border-radius:14px; overflow:hidden; box-shadow:0 4px 12px rgba(60,50,20,.12); }
th, td { padding:13px 16px; font-size:18px; text-align:center; border-bottom:1px solid rgba(165,130,28,.35); }
th { background:#C9A227; color:#26311f; font-size:19px; font-weight:900; letter-spacing:.02em; }
td.rh { background:rgba(46,125,70,.1); color:#26311f; font-weight:800; width:190px; }
td { color:#3a4633; font-weight:600; }
tr:last-child td { border-bottom:none; }
td .em { color:#8a1a26; font-weight:800; }
td .ok { color:#2E7D46; font-weight:800; }

.side { display:flex; flex-direction:column; gap:18px; width:440px; }
.ovalbox { background:#FDFBF4; border:2px solid rgba(165,130,28,.55); border-radius:16px; padding:20px 18px 14px; box-shadow:0 4px 12px rgba(60,50,20,.12); display:flex; flex-direction:column; align-items:center; }
.oval { position:relative; width:360px; height:170px; background:radial-gradient(ellipse at 50% 40%, #3a8a53, #2E7D46 75%); border:6px solid #A5821C; border-radius:50%; }
.seat { position:absolute; width:52px; height:52px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:17px; font-weight:900; box-shadow:0 3px 8px rgba(60,50,20,.3); }
.seat.d { right:34px; bottom:-6px; background:#FDFBF4; color:#26311f; border:3px solid #C9A227; }
.seat.sb { left:50%; transform:translateX(-50%); bottom:-14px; background:#C9A227; color:#26311f; }
.seat.bb { left:34px; bottom:-6px; background:#26311f; color:#F2EEE3; }
.ovcap { margin-top:14px; color:#3a4633; font-size:16px; font-weight:700; text-align:center; }

.summary { background:#FDFBF4; border:2px solid #C9A227; border-left:10px solid #C9A227; border-radius:14px; padding:18px 20px; box-shadow:0 4px 12px rgba(60,50,20,.12); }
.summary .stitle { color:#A5821C; font-size:18px; font-weight:900; margin-bottom:8px; }
.summary p { color:#26311f; font-size:18px; font-weight:700; line-height:1.5; }
</style>
</head>
<body>
<div class="stage">
  <div class="kicker">POSITION GUIDE</div>
  <h1>블라인드 비교: <span class="gold">SB vs BB</span></h1>
  <div class="main">
    <table>
      <tr><th>항목</th><th>SB (스몰블라인드)</th><th>BB (빅블라인드)</th></tr>
      <tr><td class="rh">강제 베팅</td><td>0.5BB</td><td>1BB</td></tr>
      <tr><td class="rh">프리플랍</td><td>먼저 액션</td><td>마지막 액션 (옵션)</td></tr>
      <tr><td class="rh">행동 순서 (플랍 이후)</td><td><span class="em">항상 첫 번째</span></td><td>SB 다음</td></tr>
      <tr><td class="rh">위험</td><td><span class="em">포지션 최악</span></td><td>체크로 무료 플랍 가능</td></tr>
      <tr><td class="rh">전략</td><td>타이트하게, 레이즈 아니면 폴드</td><td><span class="ok">넓게 디펜스 가능</span></td></tr>
    </table>
    <div class="side">
      <div class="ovalbox">
        <div class="oval">
          <div class="seat bb">BB</div>
          <div class="seat sb">SB</div>
          <div class="seat d">D</div>
        </div>
        <div class="ovcap">딜러 버튼(D) 왼쪽이 SB, 그다음이 BB</div>
      </div>
      <div class="summary">
        <div class="stitle">요약</div>
        <p>SB는 가장 불리한 자리다. 0.5BB가 아까워도 약한 핸드는 폴드가 이득이다.</p>
      </div>
    </div>
  </div>
  <div class="wordmark">&#9824;HoldemMaster</div>
</div>
</body>
</html>
