<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:#0B1F17; }
.stage {
  position:relative; width:1200px; height:675px; overflow:hidden; padding:44px;
  background:
    radial-gradient(ellipse 900px 500px at 50% -10%, rgba(46,125,70,0.26), rgba(46,125,70,0) 65%),
    linear-gradient(160deg,#0B1F17 0%,#13291D 100%);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  display:flex; flex-direction:column; align-items:flex-start;
}
.kicker { color:#C9A227; font-size:15px; font-weight:700; letter-spacing:.28em; text-transform:uppercase; margin-bottom:6px; }
h1 { color:#F2EEE3; font-size:46px; font-weight:800; text-shadow:0 2px 12px rgba(0,0,0,.45); margin-bottom:24px; }
h1 .gold { color:#C9A227; }
.rows { display:flex; flex-direction:column; gap:16px; width:840px; }
.row {
  display:flex; align-items:center; gap:18px;
  background:rgba(0,0,0,.28); border:2px solid rgba(201,162,39,.55); border-radius:16px;
  padding:16px 24px;
}
.qicon {
  flex:0 0 52px; width:52px; height:52px; border-radius:50%;
  background:#C9A227; color:#0B1F17; font-weight:900; font-size:30px;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 4px 10px rgba(0,0,0,.4);
}
.q { color:#F2EEE3; font-size:27px; font-weight:800; width:280px; }
.divider { flex:0 0 2px; height:44px; background:linear-gradient(180deg, rgba(201,162,39,0), #C9A227, rgba(201,162,39,0)); }
.a { color:#C9A227; font-size:27px; font-weight:800; flex:1; }
.cards { position:absolute; right:118px; top:220px; }
.card { position:relative; width:96px; height:138px; background:linear-gradient(175deg,#FDFBF4 0%,#F2EEE3 100%); border-radius:10px; box-shadow:0 6px 14px rgba(0,0,0,.45),0 1px 3px rgba(0,0,0,.3); position:absolute; }
.card .corner { position:absolute; top:7px; left:9px; font-size:25px; font-weight:800; line-height:1; text-align:center; }
.card .corner .csuit { display:block; font-size:17px; line-height:1; margin-top:1px; }
.card .big { position:absolute; top:50%; left:50%; transform:translate(-42%,-44%); font-size:60px; line-height:1; }
.black { color:#1a1a1a; }
.c1 { transform:rotate(-10deg); left:-60px; top:0; }
.c2 { transform:rotate(9deg); left:28px; top:12px; }
.wordmark { position:absolute; right:44px; bottom:44px; color:#C9A227; font-size:15px; font-weight:800; letter-spacing:.04em; opacity:.9; }
</style>
</head>
<body>
<div class="stage">
  <div class="kicker">Holdem 3-Bet</div>
  <h1>3벳 <span class="gold">FAQ</span></h1>
  <div class="rows">
    <div class="row">
      <div class="qicon">Q</div>
      <div class="q">3벳이란?</div>
      <div class="divider"></div>
      <div class="a">리레이즈 (3번째 베팅)</div>
    </div>
    <div class="row">
      <div class="qicon">Q</div>
      <div class="q">밸류 : 블러프?</div>
      <div class="divider"></div>
      <div class="a">약 2 : 1</div>
    </div>
    <div class="row">
      <div class="qicon">Q</div>
      <div class="q">스퀴즈란?</div>
      <div class="divider"></div>
      <div class="a">오픈 + 콜러 뒤 3벳</div>
    </div>
    <div class="row">
      <div class="qicon">Q</div>
      <div class="q">3벳 콜 기준?</div>
      <div class="divider"></div>
      <div class="a">팟오즈 vs 에쿼티</div>
    </div>
  </div>
  <div class="cards">
    <div class="card c1"><div class="corner black">A<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
    <div class="card c2"><div class="corner black">K<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
  </div>
  <div class="wordmark">&#9824;HoldemMaster</div>
</div>
</body>
</html>
