<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:#0B1F17; }
.stage {
  position:relative; width:1200px; height:675px; overflow:hidden;
  background:
    radial-gradient(ellipse 900px 500px at 50% -10%, rgba(46,125,70,0.26), rgba(46,125,70,0) 65%),
    linear-gradient(160deg,#0B1F17 0%,#13291D 100%);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
.hdr { position:absolute; top:24px; left:0; width:100%; text-align:center; }
.hdr h1 { color:#F2EEE3; font-size:27px; font-weight:800; text-shadow:0 2px 12px rgba(0,0,0,.45); }
.hdr .sub { color:#C9A227; font-size:14px; font-weight:700; margin-top:4px; }
.table {
  position:absolute; left:270px; top:218px; width:660px; height:296px;
  border-radius:50%;
  background:radial-gradient(ellipse at 50% 40%, #1d4630 0%, #163a27 60%, #10301f 100%);
  border:10px solid #3a2a16;
  box-shadow:0 14px 40px rgba(0,0,0,.55), inset 0 0 60px rgba(0,0,0,.35);
  display:flex; align-items:center; justify-content:center;
}
.table .dealer { color:#C9A227; font-size:30px; font-weight:900; letter-spacing:.3em; text-shadow:0 2px 10px rgba(0,0,0,.5); }
.seat {
  position:absolute; width:80px; height:80px; border-radius:50%;
  background:linear-gradient(170deg,#0e2419,#0a1b12);
  border:3px solid rgba(201,162,39,.75);
  box-shadow:0 6px 16px rgba(0,0,0,.5);
  display:flex; align-items:center; justify-content:center;
  color:#F2EEE3; font-size:17px; font-weight:800;
}
.seat.wide { font-size:14px; }
.seat.btn { border-color:#C9A227; color:#C9A227; box-shadow:0 0 22px rgba(201,162,39,.45), 0 6px 16px rgba(0,0,0,.5); }
.wordmark { position:absolute; right:44px; bottom:40px; color:#C9A227; font-size:15px; font-weight:800; letter-spacing:.04em; opacity:.9; }
</style>
</head>
<body>
<div class="stage">
  <div class="hdr">
    <h1>9인 테이블 포지션 차트</h1>
    <div class="sub">UTG부터 시계방향 &#8212; 액션 순서대로</div>
  </div>

  <div class="table"><div class="dealer">DEALER</div></div>

  <div class="seat" style="left:188px; top:223px;">UTG</div>
  <div class="seat wide" style="left:413px; top:132px;">UTG+1</div>
  <div class="seat" style="left:707px; top:132px;">MP</div>
  <div class="seat" style="left:932px; top:223px;">LJ</div>
  <div class="seat" style="left:984px; top:361px;">HJ</div>
  <div class="seat" style="left:836px; top:482px;">CO</div>
  <div class="seat btn" style="left:560px; top:530px;">BTN</div>
  <div class="seat" style="left:284px; top:482px;">SB</div>
  <div class="seat" style="left:137px; top:361px;">BB</div>

  <div class="wordmark">&#9824;HoldemMaster</div>
</div>
</body>
</html>
