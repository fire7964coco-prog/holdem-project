<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cooler</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #0B1F17; }
  .stage {
    width: 1200px;
    height: 675px;
    overflow: hidden;
    position: relative;
    padding: 44px;
    background: linear-gradient(135deg, #0B1F17 0%, #13291D 100%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
  }
  .glow {
    position: absolute;
    left: 50%; top: 42%;
    width: 940px; height: 540px;
    transform: translate(-50%, -50%);
    background: radial-gradient(ellipse at center, rgba(46,125,70,0.28) 0%, rgba(46,125,70,0.0) 65%);
    pointer-events: none;
  }
  .title {
    position: relative;
    color: #F2EEE3;
    font-size: 42px;
    font-weight: 800;
    letter-spacing: 0.5px;
    text-align: center;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  .title .g { color: #C9A227; }
  .players {
    position: relative;
    display: flex;
    align-items: center;
    gap: 48px;
  }
  .player {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    background: rgba(0,0,0,0.22);
    border: 1px solid rgba(242,238,227,0.14);
    border-radius: 14px;
    padding: 14px 22px 16px;
  }
  .player-label {
    color: #F2EEE3;
    opacity: 0.85;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 1.5px;
  }
  .vs {
    color: #B4462E;
    font-size: 30px;
    font-weight: 900;
    letter-spacing: 2px;
    text-shadow: 0 2px 6px rgba(0,0,0,0.5);
  }
  .cards-sm { display: flex; gap: 8px; }
  .card-sm {
    width: 78px; height: 110px;
    background: #FBF8EF;
    border-radius: 8px;
    position: relative;
    box-shadow: 0 4px 10px rgba(0,0,0,0.45), inset 0 0 0 1px rgba(0,0,0,0.08);
  }
  .card-sm.win { box-shadow: 0 0 0 2px rgba(201,162,39,0.6), 0 4px 12px rgba(0,0,0,0.45); }
  .corner-sm {
    position: absolute;
    top: 6px; left: 8px;
    font-weight: 800;
    font-size: 19px;
    line-height: 1;
    text-align: center;
  }
  .corner-sm .s { display: block; font-size: 13px; margin-top: 1px; }
  .pip-sm {
    position: absolute;
    left: 50%; top: 54%;
    transform: translate(-50%, -50%);
    font-size: 42px;
    line-height: 1;
  }
  .board-wrap {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .group-label {
    color: #C9A227;
    font-size: 17px;
    font-weight: 800;
    letter-spacing: 4px;
  }
  .cards { display: flex; gap: 12px; }
  .card {
    width: 92px; height: 132px;
    background: #FBF8EF;
    border-radius: 9px;
    position: relative;
    box-shadow: 0 5px 12px rgba(0,0,0,0.45), inset 0 0 0 1px rgba(0,0,0,0.08);
  }
  .card.key { box-shadow: 0 0 0 2px rgba(201,162,39,0.6), 0 5px 14px rgba(0,0,0,0.45); }
  .corner {
    position: absolute;
    top: 7px; left: 9px;
    font-weight: 800;
    font-size: 21px;
    line-height: 1;
    text-align: center;
  }
  .corner .s { display: block; font-size: 15px; margin-top: 1px; }
  .pip {
    position: absolute;
    left: 50%; top: 53%;
    transform: translate(-50%, -50%);
    font-size: 50px;
    line-height: 1;
  }
  .black { color: #1a1a1a; }
  .red { color: #c0392b; }
  .badge {
    position: relative;
    background: linear-gradient(180deg, #D8B546 0%, #C9A227 100%);
    color: #0B1F17;
    font-size: 25px;
    font-weight: 900;
    letter-spacing: 1px;
    padding: 13px 38px;
    border-radius: 44px;
    box-shadow: 0 4px 16px rgba(201,162,39,0.4);
    white-space: nowrap;
  }
  .wordmark {
    position: absolute;
    right: 44px; bottom: 44px;
    color: #C9A227;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    opacity: 0.9;
  }
</style>
</head>
<body>
<div class="stage">
  <div class="glow"></div>

  <div class="title"><span class="g">Cooler</span></div>

  <div class="players">
    <div class="player">
      <div class="player-label">PLAYER 1</div>
      <div class="cards-sm">
        <div class="card-sm"><div class="corner-sm black">A<span class="s">&#9824;</span></div><div class="pip-sm black">&#9824;</div></div>
        <div class="card-sm"><div class="corner-sm red">A<span class="s">&#9830;</span></div><div class="pip-sm red">&#9830;</div></div>
      </div>
    </div>
    <div class="vs">VS</div>
    <div class="player">
      <div class="player-label">PLAYER 2</div>
      <div class="cards-sm">
        <div class="card-sm win"><div class="corner-sm red">K<span class="s">&#9829;</span></div><div class="pip-sm red">&#9829;</div></div>
        <div class="card-sm win"><div class="corner-sm red">K<span class="s">&#9830;</span></div><div class="pip-sm red">&#9830;</div></div>
      </div>
    </div>
  </div>

  <div class="board-wrap">
    <div class="group-label">THE BOARD</div>
    <div class="cards">
      <div class="card key"><div class="corner black">K<span class="s">&#9824;</span></div><div class="pip black">&#9824;</div></div>
      <div class="card"><div class="corner red">7<span class="s">&#9830;</span></div><div class="pip red">&#9830;</div></div>
      <div class="card"><div class="corner black">2<span class="s">&#9827;</span></div><div class="pip black">&#9827;</div></div>
      <div class="card"><div class="corner red">8<span class="s">&#9829;</span></div><div class="pip red">&#9829;</div></div>
      <div class="card"><div class="corner black">3<span class="s">&#9824;</span></div><div class="pip black">&#9824;</div></div>
    </div>
  </div>

  <div class="badge">Set of Kings beats Aces &mdash; a cooler</div>

  <div class="wordmark">&#9824;HoldemMaster</div>
</div>
</body>
</html>
