<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:#0B1F17; }
.stage {
  position:relative; width:1200px; height:675px; overflow:hidden; padding:44px;
  background:
    radial-gradient(ellipse 900px 500px at 50% -10%, rgba(46,125,70,0.26), rgba(46,125,70,0) 65%),
    linear-gradient(160deg,#0B1F17 0%,#13291D 100%);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  display:flex; flex-direction:column; align-items:center;
}
.kicker { color:#e05c4b; font-size:15px; font-weight:700; letter-spacing:.28em; text-transform:uppercase; text-align:center; margin-bottom:8px; }
h1 { color:#F2EEE3; font-size:44px; font-weight:800; text-align:center; text-shadow:0 2px 12px rgba(0,0,0,.45); }
h1 .red { color:#e05c4b; }
.wordmark { position:absolute; right:44px; bottom:44px; color:#C9A227; font-size:15px; font-weight:800; letter-spacing:.04em; opacity:.9; }

.row { display:flex; justify-content:center; gap:30px; margin-top:34px; }
.panel { width:340px; height:390px; background:rgba(0,0,0,.28); border:2px solid rgba(201,162,39,.55); border-radius:16px; padding:24px 22px; display:flex; flex-direction:column; align-items:center; }
.badge { width:48px; height:48px; border-radius:50%; background:#C9A227; color:#0B1F17; font-size:26px; font-weight:900; display:flex; align-items:center; justify-content:center; margin-bottom:12px; }
.ptitle { color:#F2EEE3; font-size:23px; font-weight:800; margin-bottom:20px; text-align:center; }
.pbody { flex:1; display:flex; align-items:center; justify-content:center; }
.caption { color:#C9A227; font-size:17px; font-weight:700; text-align:center; }

.cards { display:flex; gap:10px; }
.card { position:relative; width:70px; height:100px; background:linear-gradient(175deg,#FDFBF4 0%,#F2EEE3 100%); border-radius:8px; box-shadow:0 6px 14px rgba(0,0,0,.45),0 1px 3px rgba(0,0,0,.3); }
.card .corner { position:absolute; top:6px; left:7px; font-size:18px; font-weight:800; line-height:1; text-align:center; }
.card .corner .csuit { display:block; font-size:12px; line-height:1; margin-top:1px; }
.card .big { position:absolute; top:50%; left:50%; transform:translate(-42%,-44%); font-size:42px; line-height:1; }
.black { color:#1a1a1a; } .red { color:#c0392b; }

.robot { position:relative; width:104px; height:120px; }
.robot .antenna { position:absolute; top:0; left:50%; transform:translateX(-50%); width:4px; height:16px; background:#C9A227; }
.robot .bulb { position:absolute; top:-8px; left:50%; transform:translateX(-50%); width:12px; height:12px; border-radius:50%; background:#e05c4b; }
.robot .head { position:absolute; top:16px; left:50%; transform:translateX(-50%); width:96px; height:78px; background:#20362a; border:3px solid #C9A227; border-radius:14px; }
.robot .eye { position:absolute; top:38px; width:16px; height:16px; border-radius:50%; background:#C9A227; }
.robot .eye.l { left:26px; } .robot .eye.r { right:26px; }
.robot .mouth { position:absolute; top:68px; left:50%; transform:translateX(-50%); width:44px; height:8px; border-radius:4px; background:#C9A227; }
.robot .body { position:absolute; top:98px; left:50%; transform:translateX(-50%); width:66px; height:20px; background:#20362a; border:3px solid #C9A227; border-radius:6px; }

.handtext { color:#F2EEE3; background:rgba(192,57,43,.22); border:2px solid #c0392b; border-radius:12px; font-size:26px; font-weight:900; letter-spacing:.03em; padding:20px 22px; text-align:center; line-height:1.5; }
</style>
</head>
<body>
<div class="stage">
  <div class="kicker">Common Leaks</div>
  <h1>OVERBET <span class="red">MISTAKES</span> &mdash; TOP 3</h1>
  <div class="row">
    <div class="panel">
      <div class="badge">1</div>
      <div class="ptitle">Wrong Board</div>
      <div class="pbody">
        <div class="cards">
          <div class="card"><div class="corner black">9<span class="csuit">&#9827;</span></div><div class="big black">&#9827;</div></div>
          <div class="card"><div class="corner black">8<span class="csuit">&#9827;</span></div><div class="big black">&#9827;</div></div>
          <div class="card"><div class="corner black">7<span class="csuit">&#9827;</span></div><div class="big black">&#9827;</div></div>
        </div>
      </div>
      <div class="caption">Too wet &mdash; never overbet</div>
    </div>
    <div class="panel">
      <div class="badge">2</div>
      <div class="ptitle">Predictable Pattern</div>
      <div class="pbody">
        <div class="robot">
          <div class="antenna"></div>
          <div class="bulb"></div>
          <div class="head"></div>
          <div class="eye l"></div>
          <div class="eye r"></div>
          <div class="mouth"></div>
          <div class="body"></div>
        </div>
      </div>
      <div class="caption">Same sizing every time</div>
    </div>
    <div class="panel">
      <div class="badge">3</div>
      <div class="ptitle">Marginal Hands</div>
      <div class="pbody">
        <div class="handtext">7-2 offsuit<br>J-4</div>
      </div>
      <div class="caption">Not value, not a bluff</div>
    </div>
  </div>
  <div class="wordmark">&#9824;HoldemMaster</div>
</div>
</body>
</html>
