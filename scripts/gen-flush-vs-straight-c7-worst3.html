<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:#0B1F17; }
.stage {
  position:relative; width:1200px; height:675px; overflow:hidden; padding:38px 44px 44px;
  background:
    radial-gradient(ellipse 900px 500px at 50% -10%, rgba(46,125,70,0.26), rgba(46,125,70,0) 65%),
    linear-gradient(160deg,#0B1F17 0%,#13291D 100%);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  display:flex; flex-direction:column; align-items:center; gap:20px;
}
h1 { color:#F2EEE3; font-size:38px; font-weight:800; text-align:center; text-shadow:0 2px 12px rgba(0,0,0,.45); }
h1 .gold { color:#C9A227; }
.wordmark { position:absolute; right:44px; bottom:22px; color:#C9A227; font-size:15px; font-weight:800; letter-spacing:.04em; opacity:.9; }

.panels { display:flex; gap:24px; flex:1; }
.panel {
  width:354px; background:rgba(0,0,0,.28); border:2px solid rgba(201,162,39,.55); border-radius:16px;
  padding:18px 16px; display:flex; flex-direction:column; align-items:center; gap:14px;
}
.numbadge {
  width:52px; height:52px; border-radius:50%; background:linear-gradient(180deg,#E8C95A,#C9A227);
  color:#0B1F17; font-size:28px; font-weight:900; display:flex; align-items:center; justify-content:center;
  box-shadow:0 5px 12px rgba(0,0,0,.4);
}
.phrase { color:#F2EEE3; font-size:24px; font-weight:800; text-align:center; line-height:1.3; }
.cards { display:flex; gap:6px; }
.sub { color:#C9A227; font-size:17px; font-weight:700; }

.xmark { position:relative; width:110px; height:110px; margin-top:14px; }
.xmark::before, .xmark::after {
  content:""; position:absolute; top:50%; left:50%; width:110px; height:16px; border-radius:8px; background:#c0392b;
  box-shadow:0 4px 10px rgba(0,0,0,.4);
}
.xmark::before { transform:translate(-50%,-50%) rotate(45deg); }
.xmark::after { transform:translate(-50%,-50%) rotate(-45deg); }

.warn {
  display:flex; align-items:center; justify-content:center; width:48px; height:48px; border-radius:50%;
  border:3px solid #C9A227; background:rgba(192,57,43,.18); color:#c0392b; font-size:26px; line-height:1;
}
.oppwrap { display:flex; align-items:center; gap:12px; }

.card { position:relative; width:66px; height:95px; background:linear-gradient(175deg,#FDFBF4 0%,#F2EEE3 100%); border-radius:8px; box-shadow:0 5px 12px rgba(0,0,0,.45),0 1px 3px rgba(0,0,0,.3); }
.card .corner { position:absolute; top:5px; left:7px; font-size:17px; font-weight:800; line-height:1; text-align:center; }
.card .corner .csuit { display:block; font-size:11px; line-height:1; margin-top:1px; }
.card .big { position:absolute; top:50%; left:50%; transform:translate(-42%,-44%); font-size:38px; line-height:1; }
.card.back { background:repeating-linear-gradient(45deg,#7a1420 0 10px,#5c0f18 10px 20px); border:3px solid #F2EEE3; }
.card.xs { width:58px; height:84px; }
.card.xs .corner { font-size:15px; }
.card.xs .corner .csuit { font-size:10px; }
.card.xs .big { font-size:33px; }
.red { color:#c0392b; } .black { color:#1a1a1a; }
</style>
</head>
<body>
<div class="stage">
  <h1>플러시 vs 스트레이트 — <span class="gold">흔한 실수 3가지</span></h1>
  <div class="panels">
    <div class="panel">
      <div class="numbadge">1</div>
      <div class="phrase">스트레이트가 더 어렵다?</div>
      <div class="xmark"></div>
    </div>
    <div class="panel">
      <div class="numbadge">2</div>
      <div class="phrase">상대 플러시 무시</div>
      <div class="sub">보드</div>
      <div class="cards">
        <div class="card"><div class="corner red">Q<span class="csuit">&#9830;</span></div><div class="big red">&#9830;</div></div>
        <div class="card"><div class="corner red">9<span class="csuit">&#9830;</span></div><div class="big red">&#9830;</div></div>
        <div class="card"><div class="corner red">4<span class="csuit">&#9830;</span></div><div class="big red">&#9830;</div></div>
      </div>
      <div class="oppwrap">
        <div class="cards">
          <div class="card back"></div>
          <div class="card back"></div>
        </div>
        <div class="warn">&#9830;</div>
      </div>
    </div>
    <div class="panel">
      <div class="numbadge">3</div>
      <div class="phrase">보드 스트레이트 스플릿 확인</div>
      <div class="sub">보드</div>
      <div class="cards">
        <div class="card xs"><div class="corner black">10<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
        <div class="card xs"><div class="corner red">9<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
        <div class="card xs"><div class="corner red">8<span class="csuit">&#9830;</span></div><div class="big red">&#9830;</div></div>
        <div class="card xs"><div class="corner black">7<span class="csuit">&#9827;</span></div><div class="big black">&#9827;</div></div>
        <div class="card xs"><div class="corner red">6<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
      </div>
    </div>
  </div>
  <div class="wordmark">&#9824;HoldemMaster</div>
</div>
</body>
</html>
