<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Button</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #0B1F17; }
  .stage {
    width: 1200px;
    height: 675px;
    overflow: hidden;
    position: relative;
    padding: 44px;
    background: linear-gradient(135deg, #0B1F17 0%, #13291D 100%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
  }
  .glow {
    position: absolute;
    left: 50%; top: 42%;
    width: 940px; height: 540px;
    transform: translate(-50%, -50%);
    background: radial-gradient(ellipse at center, rgba(46,125,70,0.28) 0%, rgba(46,125,70,0.0) 65%);
    pointer-events: none;
  }
  .title {
    position: relative;
    color: #F2EEE3;
    font-size: 42px;
    font-weight: 800;
    letter-spacing: 0.5px;
    text-align: center;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  .title .g { color: #C9A227; }
  .seat {
    position: relative;
    display: flex;
    align-items: center;
    gap: 40px;
    background: rgba(0,0,0,0.22);
    border: 1px solid rgba(242,238,227,0.14);
    border-radius: 16px;
    padding: 20px 40px;
  }
  .dealer-disc {
    width: 118px; height: 118px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 32%, #E8CB6A 0%, #C9A227 55%, #9C7B1A 100%);
    box-shadow: 0 6px 16px rgba(0,0,0,0.5), inset 0 2px 4px rgba(255,255,255,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .dealer-disc::before {
    content: "";
    position: absolute;
    inset: 9px;
    border-radius: 50%;
    border: 2px dashed rgba(11,31,23,0.45);
  }
  .dealer-text {
    color: #0B1F17;
    font-size: 19px;
    font-weight: 900;
    letter-spacing: 2px;
  }
  .hole { display: flex; gap: 10px; }
  .card-back {
    width: 92px; height: 132px;
    border-radius: 9px;
    background:
      repeating-linear-gradient(45deg, rgba(242,238,227,0.16) 0px, rgba(242,238,227,0.16) 3px, transparent 3px, transparent 12px),
      repeating-linear-gradient(-45deg, rgba(242,238,227,0.12) 0px, rgba(242,238,227,0.12) 3px, transparent 3px, transparent 12px),
      linear-gradient(160deg, #8E3A28 0%, #6E2B1D 100%);
    box-shadow: 0 5px 12px rgba(0,0,0,0.5), inset 0 0 0 4px #F2EEE3, inset 0 0 0 6px rgba(0,0,0,0.15);
  }
  .board-wrap {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .group-label {
    color: #C9A227;
    font-size: 17px;
    font-weight: 800;
    letter-spacing: 4px;
  }
  .cards { display: flex; gap: 14px; }
  .card {
    width: 100px; height: 144px;
    background: #FBF8EF;
    border-radius: 10px;
    position: relative;
    box-shadow: 0 6px 14px rgba(0,0,0,0.45), inset 0 0 0 1px rgba(0,0,0,0.08);
  }
  .corner {
    position: absolute;
    top: 8px; left: 10px;
    font-weight: 800;
    font-size: 23px;
    line-height: 1;
    text-align: center;
  }
  .corner .s { display: block; font-size: 16px; margin-top: 1px; }
  .pip {
    position: absolute;
    left: 50%; top: 53%;
    transform: translate(-50%, -50%);
    font-size: 56px;
    line-height: 1;
  }
  .black { color: #1a1a1a; }
  .red { color: #c0392b; }
  .caption {
    position: relative;
    color: #F2EEE3;
    opacity: 0.88;
    font-size: 22px;
    font-weight: 600;
    text-align: center;
    letter-spacing: 0.3px;
  }
  .caption .g { color: #C9A227; font-weight: 800; }
  .wordmark {
    position: absolute;
    right: 44px; bottom: 44px;
    color: #C9A227;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    opacity: 0.9;
  }
</style>
</head>
<body>
<div class="stage">
  <div class="glow"></div>

  <div class="title">The <span class="g">Button</span></div>

  <div class="seat">
    <div class="dealer-disc"><div class="dealer-text">DEALER</div></div>
    <div class="hole">
      <div class="card-back"></div>
      <div class="card-back"></div>
    </div>
  </div>

  <div class="board-wrap">
    <div class="group-label">THE FLOP</div>
    <div class="cards">
      <div class="card"><div class="corner red">K<span class="s">&#9830;</span></div><div class="pip red">&#9830;</div></div>
      <div class="card"><div class="corner black">7<span class="s">&#9827;</span></div><div class="pip black">&#9827;</div></div>
      <div class="card"><div class="corner black">2<span class="s">&#9824;</span></div><div class="pip black">&#9824;</div></div>
    </div>
  </div>

  <div class="caption">The button acts <span class="g">last</span> on every postflop street.</div>

  <div class="wordmark">&#9824;HoldemMaster</div>
</div>
</body>
</html>
