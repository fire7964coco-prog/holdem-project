<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:#0B1F17; }
.stage {
  position:relative; width:1200px; height:675px; overflow:hidden; padding:44px;
  background:
    radial-gradient(ellipse 900px 500px at 50% -10%, rgba(46,125,70,0.26), rgba(46,125,70,0) 65%),
    linear-gradient(160deg,#0B1F17 0%,#13291D 100%);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  display:flex; flex-direction:column; align-items:center;
}
.kicker { color:#C9A227; font-size:15px; font-weight:700; letter-spacing:.22em; text-align:center; margin-bottom:8px; }
h1 { color:#F2EEE3; font-size:46px; font-weight:800; text-align:center; text-shadow:0 2px 12px rgba(0,0,0,.45); }
h1 .gold { color:#C9A227; }
.wordmark { position:absolute; right:44px; bottom:44px; color:#C9A227; font-size:15px; font-weight:800; letter-spacing:.04em; opacity:.9; }

.cols { display:flex; gap:36px; margin-top:36px; width:100%; justify-content:center; }
.panel {
  width:500px; padding:30px 34px 34px;
  background:rgba(0,0,0,.28); border:2px solid rgba(201,162,39,.55); border-radius:16px;
  display:flex; flex-direction:column; align-items:center;
}
.panel-head { display:flex; align-items:center; gap:16px; margin-bottom:10px; }
.panel-title { color:#C9A227; font-size:36px; font-weight:800; }
.panel-sub { color:#F2EEE3; font-size:21px; font-weight:600; opacity:.85; margin-bottom:22px; }

/* 포커 칩 아이콘 */
.chip { position:relative; width:56px; height:56px; border-radius:50%; flex:none;
  background:
    repeating-conic-gradient(#F2EEE3 0deg 20deg, #C9A227 20deg 60deg);
  box-shadow:0 4px 10px rgba(0,0,0,.5); }
.chip::after { content:""; position:absolute; inset:11px; border-radius:50%;
  background:#1d3a29; border:2px dashed rgba(242,238,227,.75); }
.chip.red { background:repeating-conic-gradient(#F2EEE3 0deg 20deg, #a8392c 20deg 60deg); }
.chip.red::after { background:#5c1712; }

/* 2열 매장 표 */
table { border-collapse:collapse; width:100%; }
th { color:#0B1F17; background:#C9A227; font-size:22px; font-weight:800; padding:12px 10px; }
th:first-child { border-radius:10px 0 0 0; }
th:last-child { border-radius:0 10px 0 0; }
td { color:#F2EEE3; font-size:26px; font-weight:700; padding:18px 10px; text-align:center;
  border-bottom:1px solid rgba(201,162,39,.4); background:rgba(242,238,227,.06); }
tr:last-child td { border-bottom:none; }
td.gold { color:#C9A227; }

.rake-big { color:#C9A227; font-size:58px; font-weight:900; margin:26px 0 8px; letter-spacing:.01em; }
.rake-label { color:#F2EEE3; font-size:24px; font-weight:700; opacity:.9; }
</style>
</head>
<body>
<div class="stage">
  <div class="kicker">홀덤펍 비용 가이드</div>
  <h1>바이인 <span class="gold">vs</span> 레이크</h1>

  <div class="cols">
    <div class="panel">
      <div class="panel-head">
        <div class="chip"></div>
        <div class="panel-title">바이인</div>
      </div>
      <div class="panel-sub">게임 참가비</div>
      <table>
        <tr><th>매장 유형</th><th>비용</th></tr>
        <tr><td>프리롤</td><td class="gold">무료~1만원</td></tr>
        <tr><td>일반 매장</td><td class="gold">2만~5만원</td></tr>
      </table>
    </div>

    <div class="panel">
      <div class="panel-head">
        <div class="chip red"></div>
        <div class="panel-title">레이크</div>
      </div>
      <div class="panel-sub">하우스 수수료</div>
      <div class="rake-big">팟의 10~15%</div>
      <div class="rake-label">팟에서 차감</div>
    </div>
  </div>

  <div class="wordmark">&#9824;HoldemMaster</div>
</div>
</body>
</html>
