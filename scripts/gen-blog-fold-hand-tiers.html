<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:#0B1F17; }
.stage {
  position:relative; width:1200px; height:675px; overflow:hidden; padding:32px 44px 40px;
  background:
    radial-gradient(ellipse 900px 500px at 50% -10%, rgba(46,125,70,0.26), rgba(46,125,70,0) 65%),
    linear-gradient(160deg,#0B1F17 0%,#13291D 100%);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  display:flex; flex-direction:column; align-items:center; gap:16px;
}
h1 { color:#F2EEE3; font-size:30px; font-weight:800; text-align:center; text-shadow:0 2px 12px rgba(0,0,0,.45); }
h1 .gold { color:#C9A227; }
.tier { display:flex; align-items:center; gap:22px; }
.tlabel { width:200px; text-align:right; }
.tlabel .t { font-size:22px; font-weight:900; color:#F2EEE3; }
.tlabel .d { font-size:13px; font-weight:700; color:#C9A227; margin-top:3px; }
.cells { display:flex; gap:20px; }
.cell {
  background:rgba(0,0,0,.28); border:2px solid rgba(201,162,39,.35); border-radius:14px;
  padding:14px 18px; display:flex; gap:10px;
}
.tier.top .cell { border-color:#C9A227; box-shadow:0 0 26px rgba(201,162,39,.4); }
.tier.top .tlabel .t { color:#C9A227; }
.tier.low .cell { opacity:.82; }
.card { position:relative; width:58px; height:84px; background:linear-gradient(175deg,#FDFBF4 0%,#F2EEE3 100%); border-radius:7px; box-shadow:0 5px 11px rgba(0,0,0,.45),0 1px 3px rgba(0,0,0,.3); }
.card .corner { position:absolute; top:5px; left:6px; font-size:16px; font-weight:800; line-height:1; text-align:center; }
.card .corner .csuit { display:block; font-size:11px; line-height:1; margin-top:1px; }
.card .big { position:absolute; top:50%; left:50%; transform:translate(-42%,-44%); font-size:34px; line-height:1; }
.black { color:#1a1a1a; } .red { color:#c0392b; }
.note { color:#F2EEE3; font-size:13px; font-weight:600; opacity:.8; }
.wordmark { position:absolute; right:44px; bottom:40px; color:#C9A227; font-size:15px; font-weight:800; letter-spacing:.04em; opacity:.9; }
</style>
</head>
<body>
<div class="stage">
  <h1>프리플랍 <span class="gold">핸드 티어</span> &#8212; 어디까지 잡고 갈까</h1>

  <div class="tier top">
    <div class="tlabel"><div class="t">1티어</div><div class="d">프리미엄 &#183; 레이즈</div></div>
    <div class="cells">
      <div class="cell">
        <div class="card"><div class="corner black">A<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
        <div class="card"><div class="corner red">A<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
      </div>
      <div class="cell">
        <div class="card"><div class="corner black">K<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
        <div class="card"><div class="corner red">K<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
      </div>
      <div class="cell">
        <div class="card"><div class="corner red">A<span class="csuit">&#9830;</span></div><div class="big red">&#9830;</div></div>
        <div class="card"><div class="corner red">K<span class="csuit">&#9830;</span></div><div class="big red">&#9830;</div></div>
      </div>
    </div>
  </div>

  <div class="tier">
    <div class="tlabel"><div class="t">2티어</div><div class="d">강한 핸드 &#183; 상황 봐서 플레이</div></div>
    <div class="cells">
      <div class="cell">
        <div class="card"><div class="corner black">Q<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
        <div class="card"><div class="corner red">Q<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
      </div>
      <div class="cell">
        <div class="card"><div class="corner black">A<span class="csuit">&#9827;</span></div><div class="big black">&#9827;</div></div>
        <div class="card"><div class="corner black">Q<span class="csuit">&#9827;</span></div><div class="big black">&#9827;</div></div>
      </div>
      <div class="cell">
        <div class="card"><div class="corner red">K<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
        <div class="card"><div class="corner red">Q<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
      </div>
    </div>
  </div>

  <div class="tier low">
    <div class="tlabel"><div class="t">3티어</div><div class="d">그냥 폴드</div></div>
    <div class="cells">
      <div class="cell">
        <div class="card"><div class="corner black">J<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
        <div class="card"><div class="corner red">7<span class="csuit">&#9830;</span></div><div class="big red">&#9830;</div></div>
      </div>
      <div class="cell">
        <div class="card"><div class="corner black">9<span class="csuit">&#9827;</span></div><div class="big black">&#9827;</div></div>
        <div class="card"><div class="corner red">4<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
      </div>
      <div class="cell">
        <div class="card"><div class="corner red">Q<span class="csuit">&#9830;</span></div><div class="big red">&#9830;</div></div>
        <div class="card"><div class="corner black">2<span class="csuit">&#9827;</span></div><div class="big black">&#9827;</div></div>
      </div>
    </div>
  </div>

  <div class="note">각 칸은 서로 다른 판의 예시 핸드</div>
  <div class="wordmark">&#9824;HoldemMaster</div>
</div>
</body>
</html>
