<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:#F5F0E4; }
.stage {
  position:relative; width:1200px; height:675px; overflow:hidden; padding:34px 48px 30px;
  background:
    radial-gradient(ellipse 900px 460px at 50% -12%, rgba(201,162,39,.14), rgba(201,162,39,0) 60%),
    #F5F0E4;
  color:#26311f;
  font-family:"Segoe UI","Malgun Gothic","Apple SD Gothic Neo",-apple-system,BlinkMacSystemFont,Roboto,Helvetica,Arial,sans-serif;
  display:flex; flex-direction:column;
}
.kicker { color:#A8841C; font-size:13px; font-weight:800; letter-spacing:.3em; text-align:center; }
h1 { color:#1F3D2B; font-size:40px; font-weight:800; text-align:center; margin:2px 0 8px; }
h1 .gold { color:#A8841C; }
.rule { width:130px; height:4px; background:#C9A227; border-radius:2px; margin:0 auto 18px; }
.row3 { display:flex; gap:20px; margin-bottom:18px; }
.panel {
  flex:1; background:#FBF8EF; border:2px solid rgba(201,162,39,.7); border-radius:14px;
  padding:16px 18px; box-shadow:0 4px 12px rgba(31,61,43,.08);
}
.tag {
  display:inline-block; background:#1F3D2B; color:#F2EEE3; font-size:13px; font-weight:800;
  letter-spacing:.1em; border-radius:999px; padding:4px 14px; margin-bottom:10px;
}
.panel p { font-size:16.5px; line-height:1.5; color:#37452f; }
.panel p b { color:#1F3D2B; }
.fbox {
  background:linear-gradient(160deg,#1F3D2B,#16301F); color:#F2EEE3; border-radius:10px;
  padding:14px 10px; text-align:center; font-size:18px; font-weight:800;
}
.fbox .gold { color:#C9A227; }
.rulebox { font-size:16.5px; line-height:1.55; color:#37452f; }
.rulebox b { color:#A8841C; }
.decision {
  flex:1; background:#FBF8EF; border:2px solid rgba(201,162,39,.7); border-radius:14px;
  padding:16px 22px; box-shadow:0 4px 12px rgba(31,61,43,.08);
  display:flex; align-items:center; gap:22px;
}
.cardzone { display:flex; flex-direction:column; gap:8px; }
.crow { display:flex; align-items:center; gap:7px; }
.clabel { width:44px; font-size:14px; font-weight:800; color:#1F3D2B; }
.card {
  position:relative; width:52px; height:74px;
  background:linear-gradient(175deg,#FFFEF9 0%,#F7F3E6 100%);
  border:1px solid rgba(31,61,43,.28); border-radius:6px;
  box-shadow:0 3px 6px rgba(31,61,43,.18);
}
.card .corner { position:absolute; top:4px; left:5px; font-size:13px; font-weight:800; line-height:1; text-align:center; }
.card .corner .csuit { display:block; font-size:10px; line-height:1; margin-top:1px; }
.card .big { position:absolute; top:54%; left:54%; transform:translate(-46%,-46%); font-size:28px; line-height:1; }
.black { color:#1a1a1a; } .red { color:#c0392b; }
.numszone { flex:1; display:flex; flex-direction:column; gap:8px; }
.numline { font-size:18px; font-weight:700; color:#37452f; }
.numline b { color:#1F3D2B; }
.numline .gold { color:#A8841C; font-weight:800; }
.verdict {
  align-self:flex-start; background:#2E7D46; color:#fff; border-radius:999px;
  padding:8px 22px; font-size:21px; font-weight:800; box-shadow:0 3px 8px rgba(31,61,43,.25);
}
.wordmark { position:absolute; right:44px; bottom:10px; color:#A8841C; font-size:15px; font-weight:800; letter-spacing:.04em; opacity:.95; }
</style>
</head>
<body>
<div class="stage">
  <div class="kicker">POT ODDS MASTER</div>
  <h1>팟 오즈 <span class="gold">완전 정복</span></h1>
  <div class="rule"></div>

  <div class="row3">
    <div class="panel">
      <span class="tag">정의</span>
      <p><b>콜 금액</b>이 전체 팟<b>(팟+콜)</b>에서 차지하는 비율. 콜이 이득인지 판단하는 기준.</p>
    </div>
    <div class="panel">
      <span class="tag">공식</span>
      <div class="fbox">팟오즈% =<br><span class="gold">콜 &divide; (팟+콜) &times; 100</span></div>
    </div>
    <div class="panel">
      <span class="tag">&times;4 &middot; &times;2 룰</span>
      <div class="rulebox">
        플랍&rarr;리버: 아웃츠 <b>&times;4</b><br>
        턴&rarr;리버: 아웃츠 <b>&times;2</b><br>
        예) 9아웃 &asymp; <b>36% / 18%</b>
      </div>
    </div>
  </div>

  <div class="decision">
    <span class="tag" style="align-self:flex-start;">결정 예</span>
    <div class="cardzone">
      <div class="crow">
        <span class="clabel">보드</span>
        <div class="card"><div class="corner black">A<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
        <div class="card"><div class="corner black">7<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
        <div class="card"><div class="corner red">2<span class="csuit">&#9829;</span></div><div class="big red">&#9829;</div></div>
      </div>
      <div class="crow">
        <span class="clabel">핸드</span>
        <div class="card"><div class="corner black">K<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
        <div class="card"><div class="corner black">J<span class="csuit">&#9824;</span></div><div class="big black">&#9824;</div></div>
      </div>
    </div>
    <div class="numszone">
      <div class="numline">팟 <b>12,000</b> &middot; 콜 <b>4,000</b> &rarr; 팟오즈 4,000 &divide; 16,000 = <span class="gold">25%</span></div>
      <div class="numline">플러시 드로 9아웃 &times;4 &rarr; 승률 <span class="gold">&asymp;36%</span></div>
      <div class="numline"><b>36% &gt; 25%</b> 이므로&hellip;</div>
      <div class="verdict">콜</div>
    </div>
  </div>

  <div class="wordmark">&#9824;HoldemMaster</div>
</div>
</body>
</html>
